<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipamentos — Escola de Ciclismo</title>
<style>
:root{
  --red:#CC0000;--red-bg:#FFF0F0;--red-bd:rgba(204,0,0,.25);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-bd:rgba(24,95,165,.25);
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-bd:rgba(15,110,86,.25);
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-bd:rgba(133,79,11,.25);
  --green:#3B6D11;--green-bg:#EAF3DE;--green-bd:rgba(59,109,17,.25);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-bd:rgba(83,74,183,.25);
  --gray:#5F5E5A;--gray-bg:#F1EFE8;--gray-bd:rgba(95,94,90,.25);
  --bg:#F5F4F1;--surface:#fff;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1A1A1A;--muted:#666660;--hint:#9A9A94;
  --r:10px;--rs:6px;--sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--surface);border-right:.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sb-logo{padding:1.1rem 1rem .9rem;border-bottom:.5px solid var(--border)}
.sb-logo-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sb-icon{width:32px;height:32px;background:var(--red);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.sb-name{font-size:13px;font-weight:600;line-height:1.2}
.sb-season{font-size:11px;color:var(--hint);padding-left:40px}
.sb-nav{padding:.6rem .5rem;flex:1;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:600;color:var(--hint);letter-spacing:.08em;text-transform:uppercase;padding:.5rem .5rem .2rem;margin-top:.4rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.45rem .75rem;border-radius:var(--rs);cursor:pointer;color:var(--muted);font-size:13px;transition:background .1s,color .1s;text-decoration:none}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.nav-badge{margin-left:auto;background:var(--red-bg);color:var(--red);font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px}
.sb-foot{padding:.7rem 1rem;border-top:.5px solid var(--border);display:flex;align-items:center;gap:8px}
.ua{width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-title{font-size:16px;font-weight:600}
.tb-sub{font-size:12px;color:var(--muted);margin-top:1px}
.tb-actions{display:flex;gap:8px;align-items:center}
.content{padding:1.1rem 1.5rem;flex:1}

/* BADGES */
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-warn{background:var(--amber-bg);color:var(--amber)}
.b-danger{background:var(--red-bg);color:var(--red)}
.b-info{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:var(--gray-bg);color:var(--gray)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-teal{background:var(--teal-bg);color:var(--teal)}

/* BUTTONS */
button,.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rs);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:background .11s;font-family:inherit;white-space:nowrap}
button:hover,.btn:hover{background:var(--bg)}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff}
.btn-primary:hover{background:#AA0000}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#fff}
.btn-teal:hover{background:#0a5040}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-blue:hover{background:#124d8a}

select{padding:7px 9px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--bg);color:var(--text);outline:none;cursor:pointer;font-family:inherit}
select:focus{border-color:var(--blue)}

/* ATLETA SELECTOR */
.athlete-bar{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.athlete-search{flex:1;min-width:200px;position:relative}
.athlete-search input{width:100%;padding:7px 10px 7px 30px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--bg);color:var(--text);outline:none}
.athlete-search input:focus{border-color:var(--blue);background:var(--surface)}
.s-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:14px;pointer-events:none}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.av-blue{background:var(--blue-bg);color:var(--blue)}
.av-teal{background:var(--teal-bg);color:var(--teal)}
.av-purple{background:var(--purple-bg);color:var(--purple)}
.av-amber{background:var(--amber-bg);color:var(--amber)}

/* LAYOUT PRINCIPAL: figura + tabelas */
.eq-layout{display:grid;grid-template-columns:300px 1fr;gap:1rem}
@media(max-width:1000px){.eq-layout{grid-template-columns:1fr}}

/* FIGURA */
.figura-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1rem;position:sticky;top:80px}
.figura-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;text-align:center}
.figura-svg{width:100%;display:block}
.fig-zone{cursor:pointer;transition:opacity .15s}
.fig-zone:hover{opacity:.7}
.fig-zone.tem-item{}
.fig-label{font-size:9px;fill:var(--muted);text-anchor:middle;pointer-events:none}
.figura-total{margin-top:1rem;padding-top:1rem;border-top:.5px solid var(--border);text-align:center}
.ft-val{font-size:24px;font-weight:600;color:var(--text)}
.ft-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.ft-breakdown{display:flex;justify-content:space-around;margin-top:.75rem;gap:8px}
.ft-item{text-align:center}
.ft-item-val{font-size:14px;font-weight:600}
.ft-item-lbl{font-size:10px;color:var(--muted)}

/* TABELAS DE EQUIPAMENTO */
.eq-section{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1rem}
.eq-section-hd{padding:.75rem 1rem;border-bottom:.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between}
.eq-section-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;font-weight:600;color:var(--muted);text-align:left;padding:8px 12px;border-bottom:.5px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
tbody tr{border-bottom:.5px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
td{padding:8px 12px;vertical-align:middle;font-size:13px}
.peca-name{display:flex;align-items:center;gap:8px;font-weight:500}
.peca-ico{font-size:18px}
.row-empty td{color:var(--hint);font-style:italic}
.add-row{padding:8px 12px;text-align:center}

/* PILL SELECTORS */
.size-pills{display:flex;gap:3px;flex-wrap:wrap}
.size-pill{font-size:11px;padding:3px 8px;border-radius:5px;border:.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .1s;min-width:28px;text-align:center}
.size-pill:hover{border-color:var(--blue)}
.size-pill.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.size-pill.suggested:not(.active){border-color:var(--green);color:var(--green);font-weight:600}

.gama-select{display:flex;gap:3px;flex-wrap:wrap}
.gama-pill{font-size:11px;padding:3px 9px;border-radius:20px;border:.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .1s;white-space:nowrap}
.gama-pill:hover{border-color:var(--blue)}
.gama-pill.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd);font-weight:600}
.gama-baixa.active{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.gama-media.active{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bd)}
.gama-alta.active{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}

.pay-toggle{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .12s}
.pay-toggle.paid{background:var(--green);border-color:var(--green);color:#fff}
.pay-toggle:not(.paid):hover{border-color:var(--green)}

.remove-btn{color:var(--red);cursor:pointer;font-size:14px;opacity:.5;transition:opacity .1s}
.remove-btn:hover{opacity:1}

/* SUGESTÃO ESCALÃO */
.sugestao-box{background:var(--blue-bg);color:var(--blue);padding:.6rem .85rem;border-radius:var(--rs);font-size:12px;margin-bottom:1rem;display:flex;align-items:center;gap:8px}

/* ENCOMENDA */
.encomenda-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem}
.enc-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.8rem}
.enc-val{font-size:20px;font-weight:600}
.enc-lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r);width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;margin:1rem}
.modal-hd{padding:.9rem 1.1rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600}
.modal-body{flex:1;overflow-y:auto;padding:1.1rem}
.modal-foot{padding:.8rem 1.1rem;border-top:.5px solid var(--border);display:flex;gap:7px;justify-content:flex-end;flex-shrink:0}
.fg{margin-bottom:.8rem}
.fl2{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:3px;display:block}
.fi{width:100%;padding:7px 9px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text);background:var(--surface);outline:none;font-family:inherit}
.fi:focus{border-color:var(--blue)}
.info-box{padding:.65rem .85rem;border-radius:var(--rs);font-size:12px;margin-bottom:.8rem}
.ib-blue{background:var(--blue-bg);color:var(--blue)}
.ib-green{background:var(--green-bg);color:var(--green)}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:.55rem .95rem;border-radius:var(--rs);font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}

/* VIEW TOGGLE */
.view-toggle{display:flex;background:var(--bg);border-radius:var(--rs);padding:3px;border:.5px solid var(--border)}
.vt-btn{padding:5px 13px;border-radius:4px;font-size:12px;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .11s;font-family:inherit}
.vt-btn.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* CATALOGO VIEW */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.cat-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1rem}
.cat-card-hd{display:flex;align-items:center;gap:10px;margin-bottom:.7rem}
.cat-card-ico{font-size:24px}
.cat-card-name{font-size:14px;font-weight:600}
.cat-gama-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:.5px solid var(--border);font-size:12px}
.cat-gama-row:last-child{border-bottom:none}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
}
</style>
</head>

    7: { // Marco Silva (SUB23)
      corrida: {
        eq_jersey: {tamanho:'L', gama:'alta', fornecedorId:'forn3', pago:false},
        eq_calcao: {tamanho:'L', gama:'alta', fornecedorId:'forn3', pago:false},
        eq_meias:  {tamanho:'L', gama:'unica', fornecedorId:'forn2', pago:false},
        eq_luvas:  {tamanho:'L', gama:'alta', fornecedorId:'forn3', pago:false},
        eq_casaco: {tamanho:'L', gama:'alta', fornecedorId:'forn3', pago:false},
        eq_cri:    {tamanho:'L', gama:'alta', fornecedorId:'forn3', pago:false},
      },
      casual: {
        cas_polo: {tamanho:'L', gama:'alta', fornecedorId:'forn1', pago:false},
        cas_mochila: {tamanho:'XL', gama:'unica', fornecedorId:'forn1', pago:false}
      }
    }
  },

  // Histórico de tamanhos por atleta (épocas anteriores) - para sugestão
  historico_tamanhos: {
    1: {2025: {eq_jersey:'S', eq_calcao:'S'}}, // Afonso cresceu de S para M
    5: {2025: {eq_jersey:'XS', eq_calcao:'XS'}}, // Dinis
  },

  getAtribuicao(atletaId, secao, pecaId) {
    return this.atribuicoes[atletaId]?.[secao]?.[pecaId] || null;
  },

  setAtribuicao(atletaId, secao, pecaId, dados) {
    if(!this.atribuicoes[atletaId]) this.atribuicoes[atletaId] = {corrida:{}, casual:{}};
    if(!this.atribuicoes[atletaId][secao]) this.atribuicoes[atletaId][secao] = {};
    if(dados === null) {
      delete this.atribuicoes[atletaId][secao][pecaId];
    } else {
      this.atribuicoes[atletaId][secao][pecaId] = dados;
    }
  },

  getPeca(secao, pecaId) {
    const cat = secao === 'corrida' ? this.catalogo_corrida : this.catalogo_casual;
    return cat.find(p=>p.id===pecaId);
  },

  getGama(secao, pecaId, gamaId) {
    const peca = this.getPeca(secao, pecaId);
    return peca?.gamas.find(g=>g.id===gamaId);
  },

  // Preço de uma gama num fornecedor específico
  getPreco(gama, fornecedorId) {
    if(!gama || !gama.precos) return 0;
    const p = gama.precos.find(x=>x.fornecedorId===fornecedorId);
    return p ? p.preco : (gama.precos[0]?.preco || 0);
  },

  // Melhor preço (mais barato) de uma gama, com fornecedor
  getMelhorPreco(gama) {
    if(!gama || !gama.precos || !gama.precos.length) return null;
    return gama.precos.reduce((min,p)=>p.preco<min.preco?p:min, gama.precos[0]);
  },

  // Lista de fornecedores que vendem esta gama, ordenada por preço
  getFornecedoresGama(gama) {
    if(!gama || !gama.precos) return [];
    return [...gama.precos].sort((a,b)=>a.preco-b.preco);
  },

  // Preço de uma gama num fornecedor específico
  getPreco(gama, fornecedorId) {
    if(!gama || !gama.precos) return 0;
    const p = gama.precos.find(x=>x.fornecedorId===fornecedorId);
    return p ? p.preco : (gama.precos[0]?.preco || 0);
  },

  // Melhor preço (mais barato) de uma gama, com fornecedor
  getMelhorPreco(gama) {
    if(!gama || !gama.precos || !gama.precos.length) return null;
    return gama.precos.reduce((min,p)=>p.preco<min.preco?p:min, gama.precos[0]);
  },

  // Lista de fornecedores que vendem esta gama, ordenada por preço
  getFornecedoresGama(gama) {
    if(!gama || !gama.precos) return [];
    return [...gama.precos].sort((a,b)=>a.preco-b.preco);
  },

  sugerirTamanho(atletaId, pecaId) {
    const hist = this.historico_tamanhos[atletaId];
    if(!hist) return null;
    const anos = Object.keys(hist).sort((a,b)=>b-a);
    for(const ano of anos) {
      if(hist[ano][pecaId]) return hist[ano][pecaId];
    }
    return null;
  },

  totalAtleta(atletaId) {
    const atr = this.atribuicoes[atletaId];
    if(!atr) return {total:0, pago:0, pendente:0, itens:0};
    let total=0, pago=0, itens=0;
    ['corrida','casual'].forEach(sec=>{
      Object.entries(atr[sec]||{}).forEach(([pecaId,d])=>{
        const gama = this.getGama(sec, pecaId, d.gama);
        if(gama) {
          const preco = this.getPreco(gama, d.fornecedorId);
          total += preco;
          if(d.pago) pago += preco;
          itens++;
        }
      });
    });
    return {total, pago, pendente:total-pago, itens};
  },

  // Sugestão de gama por escalão
  gamaSugeridaEscalao(escalao) {
    if(escalao==='escolas') return 'baixa';
    if(escalao==='sub17'||escalao==='sub19') return 'media';
    return 'alta';
  }
};

function goToPeca(secao, pecaId) {
  const row = document.getElementById(`row-${secao}-${pecaId}`);

    row.style.background = 'var(--blue-bg)';

}

// ============================================================
// TABELA DE EQUIPAMENTO
// ============================================================
function renderTabelaSecao(secao, titulo, icone) {
  const a = DB.atletas.find(x=>x.id===CURRENT_ATHLETE);
  const ep = a.epocas[DB.epoca_atual];
  const catalogo = secao==='corrida' ? EQUIPAMENTOS_DB.catalogo_corrida : EQUIPAMENTOS_DB.catalogo_casual;
  const atr = EQUIPAMENTOS_DB.atribuicoes[CURRENT_ATHLETE]?.[secao] || {};

  const pecasAtribuidas = Object.keys(atr);
  const pecasDisponiveis = catalogo.filter(p=>!pecasAtribuidas.includes(p.id));

  let rows = '';
  if(!pecasAtribuidas.length) {
    rows = `<tr class="row-empty"><td colspan="5">Nenhuma peça atribuída ainda</td></tr>`;
  } else {
    pecasAtribuidas.forEach(pecaId=>{
      const peca = EQUIPAMENTOS_DB.getPeca(secao, pecaId);
      if(!peca) return;
      const d = atr[pecaId];
      const gama = EQUIPAMENTOS_DB.getGama(secao, pecaId, d.gama);
      const sugerido = EQUIPAMENTOS_DB.sugerirTamanho(CURRENT_ATHLETE, pecaId);

      const precoAtual = EQUIPAMENTOS_DB.getPreco(gama, d.fornecedorId);
      const melhor = EQUIPAMENTOS_DB.getMelhorPreco(gama);
      const isMelhor = melhor && d.fornecedorId === melhor.fornecedorId;
      const fornAtual = EQUIPAMENTOS_DB.getFornecedor(d.fornecedorId);

      rows += `<tr id="row-${secao}-${pecaId}">
        <td><div class="peca-name"><span class="peca-ico">${peca.icone}</span>${peca.nome}${peca.obrigatorio?' <span class=\"badge b-danger\" style=\"font-size:9px\">obrig.</span>':''}</div></td>
        <td><div class="size-pills">
          ${EQUIPAMENTOS_DB.TAMANHOS.map(t=>`<div class="size-pill${d.tamanho===t?' active':''}${sugerido===t&&d.tamanho!==t?' suggested':''}" onclick="setTamanho('${secao}','${pecaId}','${t}')" title="${sugerido===t?'Sugerido (ano anterior)':''}">${t}</div>`).join('')}
        </div></td>
        <td><div class="gama-select">
          ${peca.gamas.map(g=>`<div class="gama-pill gama-${g.id}${d.gama===g.id?' active':''}" onclick="setGama('${secao}','${pecaId}','${g.id}')" title="${g.desc||''}">${g.nome.replace('Gama ','')}</div>`).join('')}
        </div></td>
        <td>
          <select class="fi" style="font-size:11px;padding:3px 6px" onchange="setFornecedor('${secao}','${pecaId}',this.value)">
            ${EQUIPAMENTOS_DB.getFornecedoresGama(gama).map(p=>{
              const f = EQUIPAMENTOS_DB.getFornecedor(p.fornecedorId);
              const isM = melhor && p.fornecedorId===melhor.fornecedorId;
              return `<option value="${p.fornecedorId}" ${d.fornecedorId===p.fornecedorId?'selected':''}>${f.nome} — ${fmtEur(p.preco)}${isM?' 🏆':''}</option>`;
            }).join('')}
          </select>
        </td>
        <td style="text-align:right"><strong style="${isMelhor?'color:var(--green)':''}">${fmtEur(precoAtual)}</strong>${isMelhor?' <span title="Melhor preço" style="font-size:11px">🏆</span>':''}</td>
        <td style="text-align:center"><div class="pay-toggle${d.pago?' paid':''}" onclick="togglePago('${secao}','${pecaId}')" title="${d.pago?'Pago':'Marcar como pago'}">${d.pago?'✓':''}</div></td>
        <td style="text-align:right"><span class="remove-btn" onclick="removePeca('${secao}','${pecaId}')" title="Remover">✕</span></td>
      </tr>`;
    });
  }

  return `
  <div class="eq-section">
    <div class="eq-section-hd">
      <div class="eq-section-title">${icone} ${titulo}</div>
      <button class="btn-sm" onclick="openAddPecaModal('${secao}')" ${!pecasDisponiveis.length?'disabled style="opacity:.4;cursor:not-allowed"':''}>+ Adicionar peça</button>
    </div>
    <table>
      <colgroup><col style="width:18%"><col style="width:22%"><col style="width:14%"><col style="width:22%"><col style="width:10%"><col style="width:6%"><col style="width:6%"></colgroup>
      <thead><tr><th>Peça</th><th>Tamanho</th><th>Gama</th><th>Fornecedor</th><th style="text-align:right">Preço</th><th style="text-align:center">Pago</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// RENDER ATLETA CONTENT

function renderAthleteContent() {
  const a = DB.atletas.find(x=>x.id===CURRENT_ATHLETE);
  if(!a) return;
  const ep = a.epocas[DB.epoca_atual];
  const gamaSugerida = EQUIPAMENTOS_DB.gamaSugeridaEscalao(ep.escalao);
  const gamaSugeridaNome = {baixa:'Baixa',media:'Média',alta:'Alta'}[gamaSugerida];

  const html = `
  <div class="sugestao-box">
    💡 Para o escalão <strong>${escalaoFull(ep)}</strong>, a gama habitual é <strong>${gamaSugeridaNome}</strong> — mas a escolha final é sempre do treinador, por peça.
  </div>
  <div class="eq-layout">
    <div>${renderFigura()}</div>
    <div>
      ${renderTabelaSecao('corrida', 'Equipamento de Corrida', '🚴')}
      ${renderTabelaSecao('casual', 'Roupa Casual', '🎒')}
    </div>
  </div>`;

  document.getElementById('athlete-content').innerHTML = html;
  updateFiguraTotal();
}

function updateFiguraTotal() {
  const t = EQUIPAMENTOS_DB.totalAtleta(CURRENT_ATHLETE);
  const figTotal = document.getElementById('fig-total');
  if(!figTotal) return;
  figTotal.textContent = fmtEur(t.total);
  document.getElementById('fig-pago').textContent = fmtEur(t.pago);
  document.getElementById('fig-pendente').textContent = fmtEur(t.pendente);
  document.getElementById('fig-itens').textContent = t.itens;
}

// ============================================================
// AÇÕES TABELA
// ============================================================
function setTamanho(secao, pecaId, tamanho) {
  const atr = EQUIPAMENTOS_DB.atribuicoes[CURRENT_ATHLETE][secao][pecaId];
  atr.tamanho = tamanho;
  renderAthleteContent();
}

function setGama(secao, pecaId, gamaId) {
  const atr = EQUIPAMENTOS_DB.atribuicoes[CURRENT_ATHLETE][secao][pecaId];
  atr.gama = gamaId;
  // ao mudar de gama, escolher automaticamente o fornecedor mais barato dessa gama
  const novaGama = EQUIPAMENTOS_DB.getGama(secao, pecaId, gamaId);
  const melhor = EQUIPAMENTOS_DB.getMelhorPreco(novaGama);
  if(melhor) atr.fornecedorId = melhor.fornecedorId;
  renderAthleteContent();
  toast('Gama atualizada','ok');
}

function setFornecedor(secao, pecaId, fornecedorId) {
  const atr = EQUIPAMENTOS_DB.atribuicoes[CURRENT_ATHLETE][secao][pecaId];
  atr.fornecedorId = fornecedorId;
  renderAthleteContent();
  const f = EQUIPAMENTOS_DB.getFornecedor(fornecedorId);
  toast('Fornecedor: '+f.nome,'ok');
}

function togglePago(secao, pecaId) {
  const atr = EQUIPAMENTOS_DB.atribuicoes[CURRENT_ATHLETE][secao][pecaId];
  atr.pago = !atr.pago;
  renderAthleteContent();
  toast(atr.pago?'Marcado como pago':'Marcado como pendente', atr.pago?'ok':'');
}

function removePeca(secao, pecaId) {
  EQUIPAMENTOS_DB.setAtribuicao(CURRENT_ATHLETE, secao, pecaId, null);
  renderAthleteContent();
  toast('Peça removida');
}

// ============================================================
// MODAL ADICIONAR PEÇA
// ============================================================
function openAddPecaModal(secao, pecaIdPreSel) {
  const a = DB.atletas.find(x=>x.id===CURRENT_ATHLETE);
  const ep = a.epocas[DB.epoca_atual];
  const catalogo = secao==='corrida' ? EQUIPAMENTOS_DB.catalogo_corrida : EQUIPAMENTOS_DB.catalogo_casual;
  const atr = EQUIPAMENTOS_DB.atribuicoes[CURRENT_ATHLETE]?.[secao] || {};
  const disponiveis = catalogo.filter(p=>!atr[p.id]);

  if(!disponiveis.length) { toast('Todas as peças já foram atribuídas'); return; }

  ADD_PECA_CONTEXT = {secao};
  document.getElementById('add-peca-title').textContent = secao==='corrida' ? 'Adicionar peça de corrida' : 'Adicionar roupa casual';

  const gamaSugerida = EQUIPAMENTOS_DB.gamaSugeridaEscalao(ep.escalao);

  document.getElementById('add-peca-body').innerHTML = `
    <div class="fg">
      <label class="fl2">Peça</label>
      <select class="fi" id="add-peca-select" onchange="updateAddPecaPreview()">
        ${disponiveis.map(p=>`<option value="${p.id}" ${p.id===pecaIdPreSel?'selected':''}>${p.icone} ${p.nome}${p.obrigatorio?' (obrigatório)':''}</option>`).join('')}
      </select>
    </div>
    <div class="fg">
      <label class="fl2">Tamanho</label>
      <div class="size-pills" id="add-peca-tamanhos">
        ${EQUIPAMENTOS_DB.TAMANHOS.map((t,i)=>`<div class="size-pill${i===2?' active':''}" data-tamanho="${t}" onclick="selectAddTamanho(this)">${t}</div>`).join('')}
      </div>
    </div>
    <div class="fg">
      <label class="fl2">Gama</label>
      <div class="gama-select" id="add-peca-gamas"></div>
    </div>
    <div class="fg">
      <label class="fl2">Fornecedor</label>
      <select class="fi" id="add-peca-fornecedor"></select>
    </div>
    <div class="info-box ib-blue" id="add-peca-info"></div>
  `;

  openModal('modal-add-peca');
}

function selectAddTamanho(el) {
  el.parentElement.querySelectorAll('.size-pill').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
}

function updateAddPecaPreview() {
  const pecaId = document.getElementById('add-peca-select').value;
  const peca = EQUIPAMENTOS_DB.getPeca(ADD_PECA_CONTEXT.secao, pecaId);
  const a = DB.atletas.find(x=>x.id===CURRENT_ATHLETE);
  const ep = a.epocas[DB.epoca_atual];
  const gamaSugerida = EQUIPAMENTOS_DB.gamaSugeridaEscalao(ep.escalao);

  const gamasHtml = peca.gamas.map((g,i)=>{
    const isSug = g.id===gamaSugerida || (i===0);
    return `<div class="gama-pill gama-${g.id}${isSug?' active':''}" data-gama="${g.id}" onclick="selectAddGama(this)" title="${g.desc||''}">${g.nome.replace('Gama ','')}</div>`;
  }).join('');
  document.getElementById('add-peca-gamas').innerHTML = gamasHtml;
  updateAddPecaFornecedores();

  // sugestão de tamanho
  const sugerido = EQUIPAMENTOS_DB.sugerirTamanho(CURRENT_ATHLETE, pecaId);
  const info = document.getElementById('add-peca-info');
  if(sugerido) {
    info.innerHTML = `💡 No ano anterior usou tamanho <strong>${sugerido}</strong> para esta peça.`;
    info.style.display='block';
    // pré-selecionar
    document.querySelectorAll('#add-peca-tamanhos .size-pill').forEach(s=>{
      s.classList.toggle('active', s.dataset.tamanho===sugerido);
    });
  } else {
    info.style.display='none';
  }
}

function selectAddGama(el) {
  el.parentElement.querySelectorAll('.gama-pill').forEach(g=>g.classList.remove('active'));
  el.classList.add('active');
  updateAddPecaFornecedores();
}

function updateAddPecaFornecedores() {
  const pecaId = document.getElementById('add-peca-select').value;
  const gamaEl = document.querySelector('#add-peca-gamas .gama-pill.active');
  if(!gamaEl) return;
  const gama = EQUIPAMENTOS_DB.getGama(ADD_PECA_CONTEXT.secao, pecaId, gamaEl.dataset.gama);
  const fornecedores = EQUIPAMENTOS_DB.getFornecedoresGama(gama);
  const melhor = EQUIPAMENTOS_DB.getMelhorPreco(gama);
  document.getElementById('add-peca-fornecedor').innerHTML = fornecedores.map(p=>{
    const f = EQUIPAMENTOS_DB.getFornecedor(p.fornecedorId);
    const isM = melhor && p.fornecedorId===melhor.fornecedorId;
    return `<option value="${p.fornecedorId}">${f.nome} — ${fmtEur(p.preco)}${isM?' 🏆 mais barato':''}</option>`;
  }).join('');
}

function confirmAddPeca() {
  const pecaId = document.getElementById('add-peca-select').value;
  const tamanhoEl = document.querySelector('#add-peca-tamanhos .size-pill.active');
  const gamaEl = document.querySelector('#add-peca-gamas .gama-pill.active');
  const fornecedorId = document.getElementById('add-peca-fornecedor').value;
  if(!tamanhoEl || !gamaEl) { toast('Seleciona tamanho e gama'); return; }

  EQUIPAMENTOS_DB.setAtribuicao(CURRENT_ATHLETE, ADD_PECA_CONTEXT.secao, pecaId, {
    tamanho: tamanhoEl.dataset.tamanho,
    gama: gamaEl.dataset.gama,
    fornecedorId: fornecedorId,
    pago: false
  });
  closeModal('modal-add-peca');
  renderAthleteContent();
  toast('Peça adicionada!','ok');
}

function renderComparativo() {
  function tabelaCatalogo(catalogo, titulo, icone, secaoId) {
    let rows = '';
    catalogo.forEach(peca=>{
      peca.gamas.forEach(gama=>{
        const fornecedores = EQUIPAMENTOS_DB.getFornecedoresGama(gama);
        const melhor = EQUIPAMENTOS_DB.getMelhorPreco(gama);
        rows += `<tr>
          <td><div class="peca-name"><span class="peca-ico">${peca.icone}</span>${peca.nome}</div></td>
          <td>${gama.nome}${gama.desc?` <span style="color:var(--hint);font-size:11px">— ${gama.desc}</span>`:''}</td>
          ${EQUIPAMENTOS_DB.fornecedores.map(f=>{
            const p = fornecedores.find(x=>x.fornecedorId===f.id);
            if(!p) return `<td style="text-align:center;color:var(--hint)">—</td>`;
            const isMelhor = melhor && p.fornecedorId===melhor.fornecedorId;
            return `<td style="text-align:center;${isMelhor?'color:var(--green);font-weight:700;background:var(--green-bg)':''}">${fmtEur(p.preco)}${isMelhor?' 🏆':''}</td>`;
          }).join('')}
        </tr>`;
      });
    });
    return `
    <div class="eq-section">
      <div class="eq-section-hd"><div class="eq-section-title">${icone} ${titulo}</div></div>
      <table>
        <thead><tr>
          <th>Peça</th><th>Gama</th>
          ${EQUIPAMENTOS_DB.fornecedores.map(f=>`<th style="text-align:center">${f.nome}</th>`).join('')}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  const html = `
  <div class="info-box ib-blue" style="margin-bottom:1rem">📊 Mapa comparativo de preços entre fornecedores. 🏆 indica o preço mais baixo para cada peça/gama.</div>

  <div class="eq-section">
    <div class="eq-section-hd"><div class="eq-section-title">🏢 Fornecedores</div></div>
    <table>
      <thead><tr><th>Fornecedor</th><th>Contacto</th><th>Email</th><th>Notas</th></tr></thead>
      <tbody>
        ${EQUIPAMENTOS_DB.fornecedores.map(f=>`<tr>
          <td><div class="peca-name">🏢 ${f.nome}</div></td>
          <td>${f.contacto}</td>
          <td>${f.email}</td>
          <td style="color:var(--muted);font-size:12px">${f.notas}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>

  ${tabelaCatalogo(EQUIPAMENTOS_DB.catalogo_corrida, 'Equipamento de Corrida', '🚴')}
  ${tabelaCatalogo(EQUIPAMENTOS_DB.catalogo_casual, 'Roupa Casual', '🎒')}
  `;

  document.getElementById('view-comparativo').innerHTML = html;
}

function renderEncomenda() {
  // Agregar todas as atribuições por peça+tamanho+gama+fornecedor
  const agregado = {};
  const porFornecedor = {}; // fornecedorId -> {count, total}
  let totalGeral = 0, totalPago = 0, totalPendente = 0;

  Object.entries(EQUIPAMENTOS_DB.atribuicoes).forEach(([atletaId, atr])=>{
    ['corrida','casual'].forEach(secao=>{
      Object.entries(atr[secao]||{}).forEach(([pecaId,d])=>{
        const gama = EQUIPAMENTOS_DB.getGama(secao, pecaId, d.gama);
        if(!gama) return;
        const preco = EQUIPAMENTOS_DB.getPreco(gama, d.fornecedorId);
        const key = `${secao}|${pecaId}|${d.tamanho}|${d.gama}|${d.fornecedorId}`;
        if(!agregado[key]) agregado[key] = {secao, pecaId, tamanho:d.tamanho, gama:d.gama, fornecedorId:d.fornecedorId, count:0, preco};
        agregado[key].count++;
        totalGeral += preco;
        if(d.pago) totalPago += preco; else totalPendente += preco;

        if(!porFornecedor[d.fornecedorId]) porFornecedor[d.fornecedorId] = {count:0, total:0};
        porFornecedor[d.fornecedorId].count++;
        porFornecedor[d.fornecedorId].total += preco;
      });
    });
  });

  const linhas = Object.values(agregado).sort((a,b)=>{
    if(a.secao!==b.secao) return a.secao==='corrida'?-1:1;
    if(a.pecaId!==b.pecaId) return a.pecaId.localeCompare(b.pecaId);
    return (a.fornecedorId||'').localeCompare(b.fornecedorId||'');
  });

  const html = `
  <div class="info-box ib-blue" style="margin-bottom:1rem">📦 Resumo de encomenda — agrega todas as peças, tamanhos, gamas e fornecedores atribuídos a todos os atletas ativos.</div>

  <div class="encomenda-summary">
    <div class="enc-card"><div class="enc-val">${linhas.reduce((a,l)=>a+l.count,0)}</div><div class="enc-lbl">Itens totais</div></div>
    <div class="enc-card"><div class="enc-val">${fmtEur(totalGeral)}</div><div class="enc-lbl">Valor total</div></div>
    <div class="enc-card"><div class="enc-val" style="color:var(--green)">${fmtEur(totalPago)}</div><div class="enc-lbl">Já pago</div></div>
    <div class="enc-card"><div class="enc-val" style="color:var(--amber)">${fmtEur(totalPendente)}</div><div class="enc-lbl">Pendente</div></div>
  </div>

  <div class="eq-section">
    <div class="eq-section-hd"><div class="eq-section-title">🏢 Encomenda por fornecedor</div></div>
    <table>
      <thead><tr><th>Fornecedor</th><th>Contacto</th><th style="text-align:center">Itens</th><th style="text-align:right">Total a encomendar</th></tr></thead>
      <tbody>
        ${Object.entries(porFornecedor).map(([fid,d])=>{
          const f = EQUIPAMENTOS_DB.getFornecedor(fid);
          return `<tr>
            <td><div class="peca-name">🏢 ${f?f.nome:'Sem fornecedor'}</div></td>
            <td style="color:var(--muted);font-size:12px">${f?f.contacto+' · '+f.email:'—'}</td>
            <td style="text-align:center;font-weight:600">${d.count}</td>
            <td style="text-align:right;font-weight:600">${fmtEur(d.total)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <div class="eq-section">
    <div class="eq-section-hd">
      <div class="eq-section-title">📋 Lista de encomenda detalhada</div>
      <button class="btn-sm btn-teal" onclick="toast('Exportação para Excel em breve')">📤 Exportar</button>
    </div>
    <table>
      <thead><tr><th>Secção</th><th>Peça</th><th>Tamanho</th><th>Gama</th><th>Fornecedor</th><th style="text-align:center">Qtd.</th><th style="text-align:right">Preço unit.</th><th style="text-align:right">Subtotal</th></tr></thead>
      <tbody>
        ${linhas.map(l=>{
          const peca = EQUIPAMENTOS_DB.getPeca(l.secao, l.pecaId);
          const gama = EQUIPAMENTOS_DB.getGama(l.secao, l.pecaId, l.gama);
          const forn = EQUIPAMENTOS_DB.getFornecedor(l.fornecedorId);
          return `<tr>
            <td><span class="badge ${l.secao==='corrida'?'b-info':'b-purple'}">${l.secao==='corrida'?'Corrida':'Casual'}</span></td>
            <td><div class="peca-name"><span class="peca-ico">${peca.icone}</span>${peca.nome}</div></td>
            <td><span class="badge b-gray">${l.tamanho}</span></td>
            <td>${gama.nome}</td>
            <td>${forn?forn.nome:'—'}</td>
            <td style="text-align:center;font-weight:600">${l.count}</td>
            <td style="text-align:right">${fmtEur(l.preco)}</td>
            <td style="text-align:right;font-weight:600">${fmtEur(l.preco*l.count)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;

  document.getElementById('view-encomenda').innerHTML = html;
}

function setView(v) {

    document.getElementById('view-'+x).style.display = x===v?'block':'none';

  if(v==='encomenda') renderEncomenda();

// GESTÃO DO CATÁLOGO — adicionar gama, peça, toggle obrigatório, margem
// ============================================================
function addGama(secao, pecaId) {
  const nome = prompt('Nome da nova gama (ex: Gama Alta - SUB23):');
  if(!nome) return;
  const preco = parseFloat(prompt('Preço base (€):'));
  if(isNaN(preco)) return;
  const cat = secao==='corrida' ? EQUIPAMENTOS_DB.catalogo_corrida : EQUIPAMENTOS_DB.catalogo_casual;
  const peca = cat.find(p=>p.id===pecaId);
  if(!peca) return;
  const novaGama = {
    id:'g'+Date.now(), nome, desc:'',
    precos:[{fornecedorId:'forn1', preco}]
  };
  peca.gamas.push(novaGama);
  toast('Gama adicionada!','ok');
  renderCatalogo();
}

function openAddPeca(secao) {
  const nome = prompt('Nome da nova peça (ex: Capa de Chuva):');
  if(!nome) return;
  const icone = prompt('Emoji/ícone (ex: 🌧️):')||'📦';
  const obrig = confirm('É obrigatória?');
  const margem = obrig ? 0 : parseFloat(prompt('Margem % para o clube (peças opcionais):')||'0')||0;
  const novaPeca = {
    id:'p'+Date.now(), nome, icone,
    obrigatorio:obrig, margem,
    gamas:[{id:'g'+Date.now()+'a', nome:'Padrão', desc:'', precos:[{fornecedorId:'forn1', preco:0}]}]
  };
  if(secao==='corrida') EQUIPAMENTOS_DB.catalogo_corrida.push(novaPeca);
  else EQUIPAMENTOS_DB.catalogo_casual.push(novaPeca);
  toast('Peça adicionada ao catálogo!','ok');
  renderCatalogo();
}

function toggleObrigatorio(secao, pecaId) {
  const cat = secao==='corrida' ? EQUIPAMENTOS_DB.catalogo_corrida : EQUIPAMENTOS_DB.catalogo_casual;
  const peca = cat.find(p=>p.id===pecaId);
  if(!peca) return;
  peca.obrigatorio = !peca.obrigatorio;
  if(!peca.obrigatorio && !peca.margem) {
    const m = prompt('Margem % para o clube nesta peça opcional:','0');
    peca.margem = parseFloat(m)||0;
  }
  toast(peca.obrigatorio?'Marcada como obrigatória':'Marcada como opcional — peça cobrada ao atleta','ok');
  renderCatalogo();
}

function calcPrecoComMargem(preco, margem) {
  return preco * (1 + (margem||0)/100);
}



// ============================================================
// MELHORIA 1 — renderFornecedores (CRUD completo)
// ============================================================
function renderFornecedores() {
  const forns = EQUIPAMENTOS_DB.fornecedores;
  document.getElementById('view-fornecedores').innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem">
    <div style="font-size:14px;font-weight:600">🏢 Fornecedores</div>
    <button class="btn-primary btn-sm" onclick="openAddFornecedor()">+ Novo fornecedor</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    ${forns.map(f=>`
    <div style="background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.9rem 1rem" id="forn-row-${f.id}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="font-size:22px;flex-shrink:0">🏢</div>
        <div style="flex:1" id="forn-view-${f.id}">
          <div style="font-size:14px;font-weight:600">${f.nome}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">📞 ${f.contacto||'—'} · 📧 ${f.email||'—'}</div>
          ${f.notas?`<div style="font-size:12px;color:var(--muted);font-style:italic;margin-top:2px">${f.notas}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">

        </div>
      </div>
      <div id="forn-edit-${f.id}" style="display:none;margin-top:.75rem;padding-top:.75rem;border-top:.5px solid var(--border)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:2px">Nome *</label>
            <input type="text" id="fi-nome-${f.id}" value="${f.nome}" style="width:100%;padding:6px 8px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px"></div>
          <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:2px">Contacto</label>
            <input type="tel" id="fi-tel-${f.id}" value="${f.contacto||''}" style="width:100%;padding:6px 8px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px"></div>
          <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:2px">Email</label>
            <input type="email" id="fi-email-${f.id}" value="${f.email||''}" style="width:100%;padding:6px 8px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px"></div>
          <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:2px">Notas</label>
            <input type="text" id="fi-notas-${f.id}" value="${f.notas||''}" style="width:100%;padding:6px 8px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px"></div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn-sm btn-green" onclick="guardarFornecedor('${f.id}')">✓ Guardar</button>
          <button class="btn-sm btn-ghost" onclick="cancelarFornecedor('${f.id}')">Cancelar</button>
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

function editarFornecedor(id) {
  document.getElementById('forn-view-'+id).style.display='none';
  document.getElementById('forn-edit-'+id).style.display='block';
}

function cancelarFornecedor(id) {
  document.getElementById('forn-view-'+id).style.display='';
  document.getElementById('forn-edit-'+id).style.display='none';
}

function guardarFornecedor(id) {
  const f = EQUIPAMENTOS_DB.getFornecedor(id);
  if(!f) return;
  f.nome = document.getElementById('fi-nome-'+id)?.value.trim() || f.nome;
  f.contacto = document.getElementById('fi-tel-'+id)?.value.trim() || '';
  f.email = document.getElementById('fi-email-'+id)?.value.trim() || '';
  f.notas = document.getElementById('fi-notas-'+id)?.value.trim() || '';
  toast('Fornecedor guardado!','ok');
  renderFornecedores();
}

function eliminarFornecedor(id) {
  const f = EQUIPAMENTOS_DB.getFornecedor(id);
  if(!f) return;
  if(!confirm('Eliminar fornecedor "'+f.nome+'"? Esta ação não pode ser desfeita.')) return;
  EQUIPAMENTOS_DB.fornecedores = EQUIPAMENTOS_DB.fornecedores.filter(x=>x.id!==id);
  toast('Fornecedor eliminado','warn');
  renderFornecedores();
}

function openAddFornecedor() {
  const nome = prompt('Nome do fornecedor *:');
  if(!nome || !nome.trim()) return;
  const tel = prompt('Contacto (telefone):') || '';
  const email = prompt('Email:') || '';
  const notas = prompt('Notas:') || '';
  EQUIPAMENTOS_DB.fornecedores.push({
    id:'forn'+Date.now(), nome:nome.trim(),
    contacto:tel, email, notas
  });
  toast('Fornecedor adicionado!','ok');
  renderFornecedores();
}

// ============================================================
// MELHORIAS 2+3+4 — obrigatório=clube / opcional=atleta com margem
// ============================================================
function getPrecoCobrado(secao, pecaId, gamaId, fornecedorId) {
  const peca = EQUIPAMENTOS_DB.getPeca(secao, pecaId);
  const gama = EQUIPAMENTOS_DB.getGama(secao, pecaId, gamaId);
  if(!peca || !gama) return 0;
  const precoBase = EQUIPAMENTOS_DB.getPreco(gama, fornecedorId);
  if(peca.obrigatorio) return 0; // clube paga — atleta não é cobrado
  return parseFloat((precoBase * (1 + (peca.margem||0)/100)).toFixed(2));
}

function getPendentesAtleta(atletaId) {
  const atr = EQUIPAMENTOS_DB.atribuicoes[atletaId];
  if(!atr) return [];
  const pendentes = [];
  ['corrida','casual'].forEach(secao=>{
    Object.entries(atr[secao]||{}).forEach(([pecaId,d])=>{
      const peca = EQUIPAMENTOS_DB.getPeca(secao, pecaId);
      if(!peca || peca.obrigatorio) return; // obrigatório = clube, não aparece
      if(d.pago) return;
      const valor = getPrecoCobrado(secao, pecaId, d.gama, d.fornecedorId);
      pendentes.push({secao, pecaId, nome:peca.nome, icone:peca.icone, valor, tamanho:d.tamanho});
    });
  });
  return pendentes;
}

// ============================================================
// MELHORIA 5 — Encomendas sequenciais com editar/fechar
// ============================================================
function renderEncomenda() {
  const agregado = {};
  const porFornecedor = {};
  let totalGeral=0, totalClube=0, totalAtleta=0;

  Object.entries(EQUIPAMENTOS_DB.atribuicoes).forEach(([atletaId,atr])=>{
    ['corrida','casual'].forEach(secao=>{
      Object.entries(atr[secao]||{}).forEach(([pecaId,d])=>{
        const peca = EQUIPAMENTOS_DB.getPeca(secao, pecaId);
        const gama = EQUIPAMENTOS_DB.getGama(secao, pecaId, d.gama);
        if(!gama||!peca) return;
        const preco = EQUIPAMENTOS_DB.getPreco(gama, d.fornecedorId);
        const precoCobrado = getPrecoCobrado(secao, pecaId, d.gama, d.fornecedorId);
        const key = secao+'|'+pecaId+'|'+d.tamanho+'|'+d.gama+'|'+d.fornecedorId;
        if(!agregado[key]) agregado[key]={secao,pecaId,peca,tamanho:d.tamanho,gama:d.gama,gamaObj:gama,fornecedorId:d.fornecedorId,count:0,preco,precoCobrado,obrigatorio:peca.obrigatorio};
        agregado[key].count++;
        totalGeral+=preco;
        if(peca.obrigatorio) totalClube+=preco; else totalAtleta+=precoCobrado;
        if(!porFornecedor[d.fornecedorId]) porFornecedor[d.fornecedorId]={count:0,total:0};
        porFornecedor[d.fornecedorId].count++;
        porFornecedor[d.fornecedorId].total+=preco;
      });
    });
  });

  const linhas = Object.values(agregado).sort((a,b)=>a.obrigatorio===b.obrigatorio?0:a.obrigatorio?-1:1);
  const encomendas = EQUIPAMENTOS_DB.encomendas;

  document.getElementById('view-encomenda').innerHTML = `
  <div class="encomenda-summary">
    <div class="enc-card"><div class="enc-val">${linhas.reduce((s,l)=>s+l.count,0)}</div><div class="enc-lbl">Itens totais</div></div>
    <div class="enc-card"><div class="enc-val" style="color:var(--blue)">${fmtEur(totalGeral)}</div><div class="enc-lbl">Custo total clube</div></div>
    <div class="enc-card"><div class="enc-val" style="color:var(--amber)">${fmtEur(totalAtleta)}</div><div class="enc-lbl">A cobrar atletas</div></div>
    <div class="enc-card"><div class="enc-val">${encomendas.length}</div><div class="enc-lbl">Encomendas</div></div>
  </div>

  <div class="eq-section">
    <div class="eq-section-hd">
      <div class="eq-section-title">📋 Itens por encomendar</div>
      <button class="btn-sm btn-primary" onclick="criarEncomenda()">+ Nova encomenda</button>
    </div>
    <table>
      <thead><tr><th>Peça</th><th>Tamanho</th><th>Gama</th><th>Fornecedor</th><th>Encargo</th><th style="text-align:center">Qtd.</th><th style="text-align:right">P.Unit.</th><th style="text-align:right">Cobrado atleta</th><th style="text-align:right">Subtotal</th></tr></thead>
      <tbody>
        ${linhas.map(l=>{
          const forn=EQUIPAMENTOS_DB.getFornecedor(l.fornecedorId);
          return `<tr>
            <td><div class="peca-name"><span class="peca-ico">${l.peca.icone}</span>${l.peca.nome}</div></td>
            <td><span class="badge b-gray">${l.tamanho||'—'}</span></td>
            <td>${l.gamaObj.nome}</td>
            <td style="font-size:12px">${forn?forn.nome:'—'}</td>
            <td>${l.obrigatorio?'<span class="badge b-info">Clube</span>':'<span class="badge b-warn">Atleta</span>'}</td>
            <td style="text-align:center;font-weight:600">${l.count}</td>
            <td style="text-align:right">${fmtEur(l.preco)}</td>
            <td style="text-align:right;color:${l.obrigatorio?'var(--muted)':'var(--amber)'}">${l.obrigatorio?'—':fmtEur(l.precoCobrado)}</td>
            <td style="text-align:right;font-weight:600">${fmtEur(l.preco*l.count)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <div class="eq-section">
    <div class="eq-section-hd"><div class="eq-section-title">📦 Registo de encomendas</div></div>
    ${!encomendas.length?'<div style="text-align:center;padding:2rem;color:var(--hint)">Sem encomendas registadas — clica em "+ Nova encomenda"</div>':
    encomendas.slice().reverse().map(enc=>{
      const forn=EQUIPAMENTOS_DB.getFornecedor(enc.fornecedorId);
      const fechada=enc.estado==='fechada';
      return `<div style="background:var(--surface);border:.5px solid ${fechada?'var(--green-bd)':'var(--border)'};border-radius:var(--r);padding:.9rem 1rem;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:13px;font-weight:700;color:var(--blue);min-width:90px">${enc.ref}</div>
          <div style="flex:1">
            <div style="font-weight:500">${forn?forn.nome:'Sem fornecedor'} · ${enc.data}</div>
            <div style="font-size:12px;color:var(--muted)">${enc.itens.length} linha(s) · ${fmtEur(enc.itens.reduce((s,i)=>s+(i.preco*i.count),0))}</div>
            ${enc.obs?`<div style="font-size:12px;color:var(--muted);font-style:italic">${enc.obs}</div>`:''}
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="badge ${fechada?'b-ok':'b-warn'}">${fechada?'Fechada':'Em aberto'}</span>
            ${!fechada?`<button class="btn-sm" onclick="editarEncomenda('${enc.id}')">✏️ Editar</button>
            <button class="btn-sm btn-teal" onclick="fecharEncomenda('${enc.id}')">🔒 Fechar</button>`:''}
          </div>
        </div>
        ${enc._editando?`<div style="margin-top:.75rem;padding-top:.75rem;border-top:.5px solid var(--border)">
          <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
            <div style="flex:1;min-width:200px"><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:2px">Observações</label>
              <input type="text" id="enc-obs-${enc.id}" value="${enc.obs||''}" placeholder="Notas para o fornecedor..." style="width:100%;padding:6px 8px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px"></div>
          </div>
          <table style="width:100%;font-size:12px;margin-bottom:8px">
            <thead><tr style="background:var(--bg)"><th style="padding:4px 8px;text-align:left">Peça</th><th style="padding:4px 8px;text-align:center">Tam.</th><th style="padding:4px 8px;text-align:center">Qtd.</th><th style="padding:4px 8px;text-align:right">P.Unit.</th><th style="padding:4px 8px"></th></tr></thead>
            <tbody>
              ${enc.itens.map((it,idx)=>`<tr>
                <td style="padding:4px 8px">${it.nome}</td>
                <td style="padding:4px 8px;text-align:center">${it.tamanho}</td>
                <td style="padding:4px 8px;text-align:center"><input type="number" min="0" value="${it.count}" style="width:55px;padding:3px 5px;border:.5px solid var(--border);border-radius:var(--rs);font-size:12px" onchange="updateItemEncomenda('${enc.id}',${idx},this.value)"></td>
                <td style="padding:4px 8px;text-align:right">${fmtEur(it.preco)}</td>
                <td style="padding:4px 8px;text-align:center"><button class="btn-sm btn-ghost" style="color:var(--red);padding:2px 6px;font-size:11px" onclick="removeItemEncomenda('${enc.id}',${idx})">✕</button></td>
              </tr>`).join('')}
            </tbody>
          </table>
          <div style="display:flex;gap:6px">
            <button class="btn-sm btn-green" onclick="guardarEncomenda('${enc.id}')">✓ Guardar</button>
            <button class="btn-sm btn-ghost" onclick="cancelarEdicaoEncomenda('${enc.id}')">Cancelar</button>
          </div>
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function criarEncomenda() {
  const fids = EQUIPAMENTOS_DB.fornecedores.map(f=>'['+f.id+'] '+f.nome).join('\n');
  const escolha = prompt('Qual o fornecedor?\n\n'+fids+'\n\nEscreve o ID (ex: forn1):');
  if(!escolha) return;
  const forn = EQUIPAMENTOS_DB.getFornecedor(escolha.trim());
  if(!forn) { toast('Fornecedor não encontrado'); return; }

  // Agregar itens para este fornecedor
  const itens = [];
  Object.entries(EQUIPAMENTOS_DB.atribuicoes).forEach(([aid,atr])=>{
    ['corrida','casual'].forEach(secao=>{
      Object.entries(atr[secao]||{}).forEach(([pecaId,d])=>{
        if(d.fornecedorId!==escolha.trim()) return;
        const peca=EQUIPAMENTOS_DB.getPeca(secao,pecaId);
        const gama=EQUIPAMENTOS_DB.getGama(secao,pecaId,d.gama);
        if(!peca||!gama) return;
        const preco=EQUIPAMENTOS_DB.getPreco(gama,d.fornecedorId);
        const key=pecaId+'|'+d.tamanho+'|'+d.gama;
        const ex=itens.find(i=>i.key===key);
        if(ex) ex.count++;
        else itens.push({key,nome:peca.nome,tamanho:d.tamanho,gama:d.gama,preco,count:1});
      });
    });
  });

  if(!itens.length) { toast('Sem itens atribuídos para este fornecedor','warn'); return; }
  const enc = EQUIPAMENTOS_DB.novaEncomenda(escolha.trim(), itens);
  toast('Encomenda '+enc.ref+' criada!','ok');
  renderEncomenda();
}

function editarEncomenda(id) {
  const enc = EQUIPAMENTOS_DB.encomendas.find(e=>e.id===id);
  if(!enc || enc.estado==='fechada') return;
  enc._editando = true;
  renderEncomenda();
}

function cancelarEdicaoEncomenda(id) {
  const enc = EQUIPAMENTOS_DB.encomendas.find(e=>e.id===id);
  if(!enc) return;
  enc._editando = false;
  renderEncomenda();
}

function guardarEncomenda(id) {
  const enc = EQUIPAMENTOS_DB.encomendas.find(e=>e.id===id);
  if(!enc) return;
  const obsEl = document.getElementById('enc-obs-'+id);
  if(obsEl) enc.obs = obsEl.value;
  enc._editando = false;
  toast('Encomenda guardada!','ok');
  renderEncomenda();
}

function fecharEncomenda(id) {
  const enc = EQUIPAMENTOS_DB.encomendas.find(e=>e.id===id);
  if(!enc) return;
  if(!confirm('Fechar a encomenda '+enc.ref+'? Depois de fechada não poderá ser editada.')) return;
  enc.estado = 'fechada';
  enc._editando = false;
  toast('Encomenda '+enc.ref+' fechada!','ok');
  renderEncomenda();
}

function updateItemEncomenda(encId, idx, val) {
  const enc = EQUIPAMENTOS_DB.encomendas.find(e=>e.id===encId);
  if(!enc) return;
  enc.itens[idx].count = parseInt(val)||0;
}

function removeItemEncomenda(encId, idx) {
  const enc = EQUIPAMENTOS_DB.encomendas.find(e=>e.id===encId);
  if(!enc) return;
  enc.itens.splice(idx,1);
  renderEncomenda();
}

</script>
