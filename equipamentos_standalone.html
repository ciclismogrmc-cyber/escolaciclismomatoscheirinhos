:root{

  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-bd:rgba(15,110,86,.25);
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-bd:rgba(133,79,11,.25);
  --green:#3B6D11;--green-bg:#EAF3DE;--green-bd:rgba(59,109,17,.25);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-bd:rgba(83,74,183,.25);
  --gray:#5F5E5A;--gray-bg:#F1EFE8;--gray-bd:rgba(95,94,90,.25);
  --bg:#F5F4F1;--surface:#fff;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1A1A1A;--muted:#666660;--hint:#9A9A94;
  --r:10px;--rs:6px;--sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--surface);border-right:.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sb-logo{padding:.8rem .75rem;border-bottom:.5px solid var(--border);text-align:center}
.sb-nav{padding:.6rem .5rem;flex:1;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:600;color:var(--hint);letter-spacing:.08em;text-transform:uppercase;padding:.5rem .5rem .2rem;margin-top:.4rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.45rem .75rem;border-radius:var(--rs);cursor:pointer;color:var(--muted);font-size:13px;transition:background .1s,color .1s;text-decoration:none}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.sb-foot{padding:.7rem 1rem;border-top:.5px solid var(--border);display:flex;align-items:center;gap:8px}
.ua{width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
/* MAIN */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-title{font-size:16px;font-weight:600}
.tb-sub{font-size:12px;color:var(--muted);margin-top:1px}
.content{padding:1.1rem 1.5rem;flex:1}
/* VISTAS */
.vt-bar{display:flex;gap:3px;background:var(--bg);border-radius:var(--rs);padding:3px;border:.5px solid var(--border);margin-bottom:1.1rem;overflow-x:auto;flex-wrap:nowrap}
.vt-btn{padding:6px 13px;border-radius:4px;font-size:12px;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .12s;font-family:inherit;white-space:nowrap}
.vt-btn:hover{background:rgba(0,0,0,.04)}
.vt-btn.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.1)}
/* BADGES */
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-warn{background:var(--amber-bg);color:var(--amber)}
.b-danger{background:var(--red-bg);color:var(--red)}
.b-info{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:var(--gray-bg);color:var(--gray)}
.b-teal{background:var(--teal-bg);color:var(--teal)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
/* BUTTONS */
button,.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rs);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:background .11s;font-family:inherit;white-space:nowrap}
button:hover,.btn:hover{background:var(--bg)}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff}
.btn-primary:hover{background:#AA0000}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#fff}
.btn-green{background:var(--green);border-color:var(--green);color:#fff}
select,input,textarea{padding:7px 9px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--surface);color:var(--text);outline:none;font-family:inherit}
select:focus,input:focus{border-color:var(--blue)}
/* SECÇÕES */
.sec{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1rem}
.sec-hd{padding:.7rem 1rem;border-bottom:.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between}
.sec-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.sec-body{padding:.9rem 1rem}
/* CATÁLOGO */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.peca-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.peca-hd{padding:.7rem .9rem;display:flex;align-items:center;gap:8px;border-bottom:.5px solid var(--border);background:var(--bg)}
.peca-ico{font-size:20px;width:30px;text-align:center}
.peca-nome{font-size:13px;font-weight:600;flex:1}
.peca-body{padding:.7rem .9rem}
.gama-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border);font-size:12px}
.gama-row:last-child{border-bottom:none}
.gama-nome{font-weight:500;min-width:100px}
.gama-desc{color:var(--muted);flex:1;font-size:11px}
/* ATLETA */
.atleta-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.7rem}
/* VISÃO GERAL */
.tabela-geral{width:100%;border-collapse:collapse;font-size:12px}
.tabela-geral th{font-size:10px;font-weight:600;color:var(--muted);text-align:center;padding:6px 8px;border-bottom:.5px solid var(--border);background:var(--bg);text-transform:uppercase;white-space:nowrap;position:sticky;top:0}
.tabela-geral th.th-nome{text-align:left}
.tabela-geral td{padding:6px 8px;border-bottom:.5px solid var(--border);text-align:center;vertical-align:middle}
.tabela-geral td.td-nome{text-align:left;font-weight:500}
.tabela-geral tr:hover{background:var(--bg);cursor:pointer}
.cell-ok{background:var(--green-bg);border-radius:4px;padding:2px 5px;font-size:11px;color:var(--green);display:inline-block}
.cell-miss{color:var(--hint);font-size:11px}
/* ENCOMENDA */
.enc-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:8px}
/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:.55rem .95rem;border-radius:var(--rs);font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
.toast.warn{background:var(--amber)}
/* MODAL */
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-ov.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r);width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.modal-hd{padding:.9rem 1.1rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600}
.modal-body{flex:1;overflow-y:auto;padding:1.1rem}
.modal-foot{padding:.8rem 1.1rem;border-top:.5px solid var(--border);display:flex;gap:7px;justify-content:flex-end;flex-shrink:0}
.fg{margin-bottom:.75rem}
.fl2{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:3px;display:block}

.fi:focus{border-color:var(--blue);outline:none}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

<script>
// ============================================================
// STATE
// ============================================================
let CURRENT_VIEW = 'catalogo';
let ATLETA_SEL = null; // id do atleta seleccionado

// ============================================================
// UTILS
// ============================================================
function fmtEur(v){return(+v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2})+'€'}
function initials(n){return n.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(x=>x[0]).join('').toUpperCase()}
function escalaoLabel(ep){if(!ep)return'—';if(ep.escalao==='escolas')return'Escolas'+(ep.subescalao?' '+ep.subescalao.toUpperCase():'');return ep.escalao.toUpperCase()}
function avColor(esc){if(esc==='sub23'||esc==='paraciclismo')return'var(--amber-bg)';if(esc==='sub17'||esc==='sub19')return'var(--blue-bg)';return'var(--teal-bg)'}

// ============================================================
// VISTAS
// ============================================================
function setView(v) {
  CURRENT_VIEW = v;
  ['catalogo','atleta','geral','fornecedores','comparativo','encomenda'].forEach(x=>{
    document.getElementById('vt-'+x).classList.toggle('active', x===v);
    document.getElementById('view-'+x).style.display = x===v?'block':'none';
  });
  if(v==='catalogo') renderCatalogo();
  else if(v==='atleta') renderAtleta();
  else if(v==='geral') renderGeral();
  else if(v==='fornecedores') renderFornecedores();
  else if(v==='comparativo') renderComparativo();
  else if(v==='encomenda') renderEncomenda();
}

// ============================================================
// CATÁLOGO
// ============================================================
function renderCatalogo() {
  const DB_EQ = EQUIPAMENTOS_DB;
  const margem_global = DB_EQ.margem_global || 10;

  function renderSecao(titulo, emoji, items, secao) {
    return `
    <div class="sec" style="margin-bottom:1rem">
      <div class="sec-hd">
        <div class="sec-title">${emoji} ${titulo}</div>
        <button class="btn-sm btn-teal" onclick="openAddPeca('${secao}')">+ Nova peça</button>
      </div>
      <div class="sec-body">
        <div class="cat-grid">
          ${items.map(p=>renderPecaCard(p, secao)).join('')}
        </div>
      </div>
    </div>`;
  }

  document.getElementById('view-catalogo').innerHTML =
    renderSecao('Corrida', '🚴', DB_EQ.catalogo_corrida, 'corrida') +
    renderSecao('Casual', '🎒', DB_EQ.catalogo_casual, 'casual');
}

function renderPecaCard(p, secao) {
  const precoMin = p.gamas.length ? Math.min(...p.gamas.flatMap(g=>g.precos.map(x=>x.preco))) : 0;
  const precoMax = p.gamas.length ? Math.max(...p.gamas.flatMap(g=>g.precos.map(x=>x.preco))) : 0;
  return `
  <div class="peca-card">
    <div class="peca-hd">
      <div class="peca-ico">${p.icone}</div>
      <div class="peca-nome">${p.nome}</div>
      <span class="badge ${p.obrigatorio?'b-info':'b-warn'}" style="cursor:pointer;font-size:10px" onclick="toggleObrigatorio('${secao}','${p.id}','${p.obrigatorio}')" title="Clica para alternar">
        ${p.obrigatorio?'Obrigatório':'Opcional'} ✎
      </span>
    </div>
    <div class="peca-body">
      ${!p.obrigatorio?`<div style="display:flex;align-items:center;gap:8px;padding:.4rem .5rem;background:var(--amber-bg);border-radius:var(--rs);margin-bottom:.5rem;font-size:12px">
        <span style="color:var(--amber)">💰 Margem clube:</span>
        <input type="number" step="1" min="0" max="100" value="${p.margem||0}" style="width:60px;padding:3px 6px;border:.5px solid var(--border);border-radius:var(--rs);font-size:12px" onchange="setMargem('${secao}','${p.id}',this.value)"> %
        <span style="color:var(--muted)">→ ex: ${fmtEur(precoMin*(1+(p.margem||0)/100))} – ${fmtEur(precoMax*(1+(p.margem||0)/100))}</span>
      </div>`:''}
      ${p.gamas.map(g=>`
        <div class="gama-row">
          <div class="gama-nome">${g.nome}</div>
          <div class="gama-desc">${g.desc||''}</div>
          <div style="font-size:12px;color:var(--blue);font-weight:600">${fmtEur(Math.min(...g.precos.map(x=>x.preco)))}${g.precos.length>1?'–'+fmtEur(Math.max(...g.precos.map(x=>x.preco))):''}</div>
          <button class="btn-ghost btn-sm" style="font-size:10px" onclick="editarGama('${secao}','${p.id}','${g.id}')">✎</button>
        </div>`).join('')}
      <div style="display:flex;gap:6px;margin-top:.5rem">
        <button class="btn-sm" onclick="addGama('${secao}','${p.id}')">+ gama</button>
        <button class="btn-sm btn-ghost" style="color:var(--red)" onclick="eliminarPeca('${secao}','${p.id}')">🗑️</button>
      </div>
    </div>
  </div>`;
}

function toggleObrigatorio(secao, pecaId, atual) {
  const peca = EQUIPAMENTOS_DB.getPeca(secao, pecaId);
  if(!peca) return;
  peca.obrigatorio = !peca.obrigatorio;
  if(!peca.obrigatorio && !peca.margem) peca.margem = 10;
  toast(peca.obrigatorio?'Marcada como obrigatória (encargo clube)':'Marcada como opcional (encargo atleta)','ok');
  renderCatalogo();
}

function setMargem(secao, pecaId, val) {
  const peca = EQUIPAMENTOS_DB.getPeca(secao, pecaId);
  if(peca) peca.margem = parseFloat(val)||0;
}

function eliminarPeca(secao, id) {
  if(!confirm('Eliminar peça? Atletas com esta peça atribuída perdem a atribuição.')) return;
  const cat = secao==='corrida' ? EQUIPAMENTOS_DB.catalogo_corrida : EQUIPAMENTOS_DB.catalogo_casual;
  const idx = cat.findIndex(p=>p.id===id);
  if(idx>=0) cat.splice(idx,1);
  toast('Peça eliminada','warn');
  renderCatalogo();
}

function addGama(secao, pecaId) {
  const nome = prompt('Nome da gama (ex: Gama Alta — SUB23):');
  if(!nome) return;
  const preco = parseFloat(prompt('Preço (€) para o fornecedor principal:')||'0');
  const peca = EQUIPAMENTOS_DB.getPeca(secao, pecaId);
  if(!peca) return;
  peca.gamas.push({id:'g'+Date.now(), nome:nome.trim(), desc:'', precos:[{fornecedorId: EQUIPAMENTOS_DB.fornecedores[0]?.id||'forn1', preco}]});
  toast('Gama adicionada!','ok');
  renderCatalogo();
}

function editarGama(secao, pecaId, gamaId) {
  const peca = EQUIPAMENTOS_DB.getPeca(secao, pecaId);
  const gama = EQUIPAMENTOS_DB.getGama(secao, pecaId, gamaId);
  if(!peca||!gama) return;
  document.getElementById('modal-peca-title').textContent = peca.nome+' — '+gama.nome;
  document.getElementById('modal-peca-body').innerHTML = `
    <div class="fg"><label class="fl2">Nome da gama</label><input type="text" class="fi" id="eg-nome" value="${gama.nome}"></div>
    <div class="fg"><label class="fl2">Descrição</label><input type="text" class="fi" id="eg-desc" value="${gama.desc||''}"></div>
    <div class="fg"><label class="fl2">Preços por fornecedor</label>
      ${EQUIPAMENTOS_DB.fornecedores.map(f=>{
        const pr = gama.precos.find(p=>p.fornecedorId===f.id);
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-size:12px;min-width:130px">${f.nome}</span>
          <input type="number" step="0.01" class="fi" id="eg-preco-${f.id}" value="${pr?pr.preco:''}" placeholder="—" style="width:90px;padding:5px 7px">
          <span style="font-size:12px;color:var(--muted)">€</span>
        </div>`;
      }).join('')}
    </div>`;
  document.getElementById('modal-peca-save').onclick = () => salvarGama(secao, pecaId, gamaId);
  openModal('modal-peca');
}

function salvarGama(secao, pecaId, gamaId) {
  const gama = EQUIPAMENTOS_DB.getGama(secao, pecaId, gamaId);
  if(!gama) return;
  const nomeEl = document.getElementById('eg-nome');
  const descEl = document.getElementById('eg-desc');
  if(nomeEl) gama.nome = nomeEl.value;
  if(descEl) gama.desc = descEl.value;
  gama.precos = [];
  EQUIPAMENTOS_DB.fornecedores.forEach(f=>{
    const el = document.getElementById('eg-preco-'+f.id);
    if(el && el.value) gama.precos.push({fornecedorId:f.id, preco:parseFloat(el.value)});
  });
  closeModal('modal-peca');
  toast('Gama guardada!','ok');
  renderCatalogo();
}

function openAddPeca(secao) {
  document.getElementById('modal-peca-title').textContent = 'Nova peça — '+(secao==='corrida'?'Corrida':'Casual');
  document.getElementById('modal-peca-body').innerHTML = `
    <div class="f2">
      <div class="fg"><label class="fl2">Ícone (emoji)</label><input type="text" class="fi" id="np-ico" value="👕" style="font-size:18px"></div>
      <div class="fg"><label class="fl2">Nome *</label><input type="text" class="fi" id="np-nome" placeholder="Ex: Capa de Chuva"></div>
    </div>
    <div class="fg">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="np-obrig" checked> Peça obrigatória (encargo do clube)
      </label>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">Peças opcionais são cobradas ao atleta com margem</div>
    </div>
    <div class="fg" id="np-margem-wrap">
      <label class="fl2">Margem % (para peças opcionais)</label>
      <input type="number" class="fi" id="np-margem" value="10" min="0" max="100">
    </div>
    <div class="fg"><label class="fl2">Nome da primeira gama</label><input type="text" class="fi" id="np-gama" value="Padrão"></div>
    <div class="fg"><label class="fl2">Preço base (€)</label><input type="number" step="0.01" class="fi" id="np-preco" value="0"></div>`;
  document.getElementById('modal-peca-save').onclick = () => confirmarAddPeca(secao);
  // Toggle margem
  setTimeout(()=>{
    const cb = document.getElementById('np-obrig');
    const wrap = document.getElementById('np-margem-wrap');
    if(cb && wrap) {
      wrap.style.display = cb.checked?'none':'block';
      cb.addEventListener('change',()=>{ wrap.style.display=cb.checked?'none':'block'; });
    }
  },0);
  openModal('modal-peca');
}

function confirmarAddPeca(secao) {
  const nome = document.getElementById('np-nome')?.value.trim();
  if(!nome) { toast('Nome obrigatório'); return; }
  const ico = document.getElementById('np-ico')?.value||'📦';
  const obrig = document.getElementById('np-obrig')?.checked||false;
  const margem = obrig?0:(parseFloat(document.getElementById('np-margem')?.value)||10);
  const gamaNome = document.getElementById('np-gama')?.value||'Padrão';
  const preco = parseFloat(document.getElementById('np-preco')?.value)||0;
  const peca = {
    id:'p'+Date.now(), nome, icone:ico, obrigatorio:obrig, margem,
    gamas:[{id:'g'+Date.now(), nome:gamaNome, desc:'', precos:[{fornecedorId:EQUIPAMENTOS_DB.fornecedores[0]?.id||'forn1',preco}]}]
  };
  if(secao==='corrida') EQUIPAMENTOS_DB.catalogo_corrida.push(peca);
  else EQUIPAMENTOS_DB.catalogo_casual.push(peca);
  closeModal('modal-peca');
  toast('Peça adicionada!','ok');
  renderCatalogo();
}

// ============================================================
// POR ATLETA
// ============================================================
function renderAtleta() {
  const ativos = DB.atletas.filter(a=>{const e=a.epocas[DB.epoca_atual];return e&&e.estado==='ativo'});
  const esc = document.getElementById('esc-filter')?.value||'';
  const q = document.getElementById('nome-filter')?.value?.toLowerCase()||'';
  const filtered = ativos.filter(a=>{
    const ep=a.epocas[DB.epoca_atual];
    if(esc && ep.escalao!==esc) return false;
    if(q && !a.nome.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('view-atleta').innerHTML = `
  <div class="atleta-bar">
    <div style="flex:1;position:relative;min-width:180px">
      <span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted)">🔍</span>
      <input type="text" id="nome-filter" placeholder="Nome do atleta..." value="${q}" oninput="renderAtleta()" style="width:100%;padding:7px 9px 7px 30px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px">
    </div>
    <select id="esc-filter" onchange="renderAtleta()" style="padding:7px 9px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px">
      <option value="">Todos os escalões</option>
      <option value="escolas" ${esc==='escolas'?'selected':''}>Escolas</option>
      <option value="sub17" ${esc==='sub17'?'selected':''}>SUB17</option>
      <option value="sub19" ${esc==='sub19'?'selected':''}>SUB19</option>
      <option value="sub23" ${esc==='sub23'?'selected':''}>SUB23</option>
      <option value="paraciclismo" ${esc==='paraciclismo'?'selected':''}>Paraciclismo</option>
    </select>
    <button class="btn-ghost btn-sm" onclick="document.getElementById('esc-filter').value='';document.getElementById('nome-filter').value='';renderAtleta()">✕</button>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">
    ${filtered.map(a=>{
      const ep=a.epocas[DB.epoca_atual];
      const atr=EQUIPAMENTOS_DB.atribuicoes[a.id]||{corrida:{},casual:{}};
      const totalPecas=[...EQUIPAMENTOS_DB.catalogo_corrida,...EQUIPAMENTOS_DB.catalogo_casual].length;
      const totalAtr=Object.keys(atr.corrida||{}).length+Object.keys(atr.casual||{}).length;
      const pendentes=getPendentesAtleta(a.id);
      return `<div style="background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.8rem;cursor:pointer;transition:border-color .1s" onclick="abrirAtleta(${a.id})" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem">
          <div style="width:32px;height:32px;border-radius:50%;background:${avColor(ep.escalao)};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">${initials(a.nome)}</div>
          <div><div style="font-weight:500;font-size:13px">${a.nome}</div><div style="font-size:11px;color:var(--muted)">${escalaoLabel(ep)}</div></div>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span class="badge ${totalAtr>0?'b-info':'b-gray'}">${totalAtr}/${totalPecas} peças</span>
          ${pendentes.length?`<span class="badge b-warn">${fmtEur(pendentes.reduce((s,p)=>s+p.valor,0))} pendente</span>`:'<span class="badge b-ok">Em dia</span>'}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function abrirAtleta(id) {
  ATLETA_SEL = id;
  const a = DB.atletas.find(x=>x.id===id);
  if(!a) return;
  document.getElementById('modal-atleta-title').textContent = '👕 '+a.nome+' — Equipamentos';
  renderAtletaBody(id);
  openModal('modal-atleta-eq');
}

function renderAtletaBody(id) {
  const a = DB.atletas.find(x=>x.id===id);
  const ep = a.epocas[DB.epoca_atual];
  if(!EQUIPAMENTOS_DB.atribuicoes[id]) EQUIPAMENTOS_DB.atribuicoes[id]={corrida:{},casual:{}};
  const atr = EQUIPAMENTOS_DB.atribuicoes[id];

  function renderSecaoAtleta(titulo, emoji, cat, secao) {
    return `
    <div style="margin-bottom:1rem">
      <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem">${emoji} ${titulo}</div>
      ${cat.map(p=>{
        const d = atr[secao][p.id] || {};
        const gamaEscolhida = d.gama || (p.gamas[0]?.id||'');
        const gamaObj = p.gamas.find(g=>g.id===gamaEscolhida)||p.gamas[0];
        const fornEscolhido = d.fornecedorId || (EQUIPAMENTOS_DB.fornecedores[0]?.id||'');
        const precoBase = EQUIPAMENTOS_DB.getPreco(gamaObj, fornEscolhido);
        const precoCobrado = EQUIPAMENTOS_DB.getPrecoCobradoAtleta(secao, p.id, gamaEscolhida, fornEscolhido);
        return `
        <div style="background:${p.obrigatorio?'var(--blue-bg)':'var(--amber-bg)'};border:.5px solid ${p.obrigatorio?'var(--blue-bd)':'var(--amber-bd)'};border-radius:var(--rs);padding:.65rem .85rem;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:.4rem">
            <span style="font-size:16px">${p.icone}</span>
            <span style="font-weight:500;flex:1">${p.nome}</span>
            <span class="badge ${p.obrigatorio?'b-info':'b-warn'}" style="font-size:10px">${p.obrigatorio?'Clube':'Atleta'}</span>
            ${!p.obrigatorio?`<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
              <input type="checkbox" id="sel-${secao}-${p.id}" ${d.selecionado?'checked':''} onchange="togglePecaOpcional('${secao}','${p.id}',this.checked)">
              Incluir
            </label>`:''}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr ${!p.obrigatorio?'auto':''};gap:6px;align-items:center">
            <div>
              <div style="font-size:10px;color:var(--muted);margin-bottom:2px">Tamanho</div>
              <select id="tam-${secao}-${p.id}" style="width:100%;padding:4px 6px;border:.5px solid var(--border);border-radius:var(--rs);font-size:12px" onchange="updateAtr('${secao}','${p.id}','tamanho',this.value)">
                <option value="">—</option>
                ${['XS','S','M','L','XL','XXL','2XS','3XS','34','36','38','40','42','44','46'].map(t=>`<option value="${t}" ${(d.tamanho||'')==t?'selected':''}>${t}</option>`).join('')}
              </select>
            </div>
            <div>
              <div style="font-size:10px;color:var(--muted);margin-bottom:2px">Gama</div>
              ${p.obrigatorio?`<select id="gama-${secao}-${p.id}" style="width:100%;padding:4px 6px;border:.5px solid var(--border);border-radius:var(--rs);font-size:12px" onchange="updateAtr('${secao}','${p.id}','gama',this.value)">
                ${p.gamas.map(g=>`<option value="${g.id}" ${gamaEscolhida===g.id?'selected':''}>${g.nome}</option>`).join('')}
              </select>`:`<div style="font-size:12px;color:var(--muted);padding:4px 0">${gamaObj?.nome||'—'}</div>`}
            </div>
            ${!p.obrigatorio?`<div style="text-align:right">
              <div style="font-size:10px;color:var(--muted);margin-bottom:2px">A pagar</div>
              <div style="font-size:13px;font-weight:600;color:var(--amber)">${fmtEur(precoCobrado)}</div>
              <div style="font-size:10px;color:var(--muted)">base ${fmtEur(precoBase)}+${p.margem||0}%</div>
            </div>`:''}
          </div>
          ${!p.obrigatorio&&d.selecionado?`<div style="margin-top:.4rem;display:flex;align-items:center;gap:6px;font-size:11px">
            <input type="checkbox" id="pago-${secao}-${p.id}" ${d.pago?'checked':''} onchange="updateAtr('${secao}','${p.id}','pago',this.checked)">
            <label for="pago-${secao}-${p.id}" style="cursor:pointer;color:var(--muted)">Pago ${d.pago?'✓':''}</label>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }

  document.getElementById('modal-atleta-body').innerHTML =
    renderSecaoAtleta('Corrida','🚴', EQUIPAMENTOS_DB.catalogo_corrida,'corrida') +
    renderSecaoAtleta('Casual','🎒', EQUIPAMENTOS_DB.catalogo_casual,'casual') +
    `<div style="padding:.65rem;background:var(--bg);border-radius:var(--rs);font-size:12px">
      <strong>Pendentes de pagamento:</strong>
      ${getPendentesAtleta(id).map(p=>`<span style="margin-left:6px">${p.icone} ${p.nome}: ${fmtEur(p.valor)}</span>`).join('') || ' <span style="color:var(--green)">✓ Nada em falta</span>'}
    </div>`;
}

function updateAtr(secao, pecaId, campo, valor) {
  if(!EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL]) EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL]={corrida:{},casual:{}};
  if(!EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL][secao][pecaId]) EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL][secao][pecaId]={};
  EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL][secao][pecaId][campo]=valor;
}

function togglePecaOpcional(secao, pecaId, checked) {
  if(!EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL]) EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL]={corrida:{},casual:{}};
  if(!EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL][secao][pecaId]) EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL][secao][pecaId]={};
  EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL][secao][pecaId].selecionado=checked;
  if(checked && !EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL][secao][pecaId].gama) {
    const peca=EQUIPAMENTOS_DB.getPeca(secao,pecaId);
    EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL][secao][pecaId].gama=peca?.gamas[0]?.id||'';
    EQUIPAMENTOS_DB.atribuicoes[ATLETA_SEL][secao][pecaId].fornecedorId=EQUIPAMENTOS_DB.fornecedores[0]?.id||'forn1';
  }
  renderAtletaBody(ATLETA_SEL);
}

function guardarAtleta() {
  // Sincronizar selects
  if(ATLETA_SEL) {
    [...EQUIPAMENTOS_DB.catalogo_corrida,...EQUIPAMENTOS_DB.catalogo_casual].forEach(p=>{
      const secao = EQUIPAMENTOS_DB.catalogo_corrida.includes(p)?'corrida':'casual';
      const tam = document.getElementById('tam-'+secao+'-'+p.id);
      const gama = document.getElementById('gama-'+secao+'-'+p.id);
      if(tam) updateAtr(secao,p.id,'tamanho',tam.value);
      if(gama) updateAtr(secao,p.id,'gama',gama.value);
    });
  }
  closeModal('modal-atleta-eq');
  toast('Equipamentos guardados!','ok');
  if(CURRENT_VIEW==='atleta') renderAtleta();
  if(CURRENT_VIEW==='geral') renderGeral();
}

function getPendentesAtleta(id) {
  const atr = EQUIPAMENTOS_DB.atribuicoes[id];
  if(!atr) return [];
  const res = [];
  ['corrida','casual'].forEach(secao=>{
    const cat = secao==='corrida'?EQUIPAMENTOS_DB.catalogo_corrida:EQUIPAMENTOS_DB.catalogo_casual;
    cat.forEach(p=>{
      if(p.obrigatorio) return;
      const d = atr[secao]?.[p.id]||{};
      if(!d.selecionado||d.pago) return;
      const fornId = d.fornecedorId||EQUIPAMENTOS_DB.fornecedores[0]?.id||'forn1';
      const gamaId = d.gama||p.gamas[0]?.id||'';
      const valor = EQUIPAMENTOS_DB.getPrecoCobradoAtleta(secao,p.id,gamaId,fornId);
      res.push({secao,pecaId:p.id,nome:p.nome,icone:p.icone,valor,tamanho:d.tamanho});
    });
  });
  return res;
}

// ============================================================
// VISÃO GERAL
// ============================================================
function renderGeral() {
  const ativos = DB.atletas.filter(a=>{const e=a.epocas[DB.epoca_atual];return e&&e.estado==='ativo'});
  const todosPecas = [...EQUIPAMENTOS_DB.catalogo_corrida,...EQUIPAMENTOS_DB.catalogo_casual];

  document.getElementById('view-geral').innerHTML = `
  <div style="overflow-x:auto">
    <table class="tabela-geral">
      <thead>
        <tr>
          <th class="th-nome" style="min-width:160px">Atleta</th>
          <th>Escalão</th>
          ${todosPecas.map(p=>`<th title="${p.nome}">${p.icone}</th>`).join('')}
          <th>Total atleta</th>
          <th>Pendentes</th>
        </tr>
      </thead>
      <tbody>
        ${ativos.map(a=>{
          const ep=a.epocas[DB.epoca_atual];
          const atr=EQUIPAMENTOS_DB.atribuicoes[a.id]||{corrida:{},casual:{}};
          const pendentes=getPendentesAtleta(a.id);
          const total=pendentes.reduce((s,p)=>s+p.valor,0);
          return `<tr onclick="abrirAtleta(${a.id})">
            <td class="td-nome">${a.nome}</td>
            <td><span class="badge b-info" style="font-size:10px">${escalaoLabel(ep)}</span></td>
            ${todosPecas.map(p=>{
              const secao=EQUIPAMENTOS_DB.catalogo_corrida.includes(p)?'corrida':'casual';
              const d=atr[secao]?.[p.id]||{};
              if(p.obrigatorio) {
                return d.tamanho
                  ? `<td><span class="cell-ok">${d.tamanho}</span></td>`
                  : `<td><span class="cell-miss">—</span></td>`;
              } else {
                if(!d.selecionado) return `<td><span class="cell-miss">—</span></td>`;
                const fornId=d.fornecedorId||EQUIPAMENTOS_DB.fornecedores[0]?.id||'forn1';
                const gamaId=d.gama||p.gamas[0]?.id||'';
                const val=EQUIPAMENTOS_DB.getPrecoCobradoAtleta(secao,p.id,gamaId,fornId);
                const icon=d.pago?'✅':'⏳';
                return `<td title="${fmtEur(val)}">${icon}${d.tamanho?'<br><small>'+d.tamanho+'</small>':''}</td>`;
              }
            }).join('')}
            <td style="text-align:right;font-weight:600">${total>0?fmtEur(total):'—'}</td>
            <td>${pendentes.length?`<span class="badge b-warn">${pendentes.length}</span>`:'<span class="badge b-ok">✓</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-top:.5rem">Legenda: ✅ pago · ⏳ pendente · tamanho = obrigatório atribuído · — = não atribuído/não selecionado · Clica numa linha para editar</div>`;
}

    <div style="display:flex;align-items:flex-start;gap:10px">
      <div style="font-size:22px">🏢</div>

        <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:2px">Nome *</label>
          <input type="text" id="fi-n-${f.id}" value="${f.nome}" style="width:100%;padding:5px 8px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px"></div>
        <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:2px">Contacto</label>
          <input type="tel" id="fi-t-${f.id}" value="${f.contacto||''}" style="width:100%;padding:5px 8px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px"></div>
        <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:2px">Email</label>

function editForn(id) {
  document.getElementById('fv-'+id).style.display='none';
  document.getElementById('fe-'+id).style.display='block';
}
function cancelForn(id) {
  document.getElementById('fv-'+id).style.display='';
  document.getElementById('fe-'+id).style.display='none';
}
function saveForn(id) {
  const f=EQUIPAMENTOS_DB.getFornecedor(id); if(!f) return;
  f.nome=document.getElementById('fi-n-'+id)?.value.trim()||f.nome;
  f.contacto=document.getElementById('fi-t-'+id)?.value.trim()||'';
  f.email=document.getElementById('fi-e-'+id)?.value.trim()||'';
  f.notas=document.getElementById('fi-o-'+id)?.value.trim()||'';
  toast('Guardado!','ok'); renderFornecedores();
}
function delForn(id) {
  const f=EQUIPAMENTOS_DB.getFornecedor(id); if(!f) return;
  if(!confirm('Eliminar "'+f.nome+'"?')) return;
  EQUIPAMENTOS_DB.fornecedores=EQUIPAMENTOS_DB.fornecedores.filter(x=>x.id!==id);
  toast('Fornecedor eliminado','warn'); renderFornecedores();
}
function openAddFornecedor() {
  const nome=prompt('Nome do fornecedor *:'); if(!nome||!nome.trim()) return;
  const tel=prompt('Contacto:')||'';
  const email=prompt('Email:')||'';
  const notas=prompt('Notas:')||'';
  EQUIPAMENTOS_DB.fornecedores.push({id:'forn'+Date.now(),nome:nome.trim(),contacto:tel,email,notas});
  toast('Fornecedor adicionado!','ok'); renderFornecedores();
}

    ...EQUIPAMENTOS_DB.catalogo_corrida.map(p=>({...p,secao:'corrida'})),

  ];
  document.getElementById('view-comparativo').innerHTML = `
  <div style="overflow-x:auto">
  <table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead>
      <tr style="background:var(--bg)">
        <th style="padding:8px 10px;text-align:left;border-bottom:.5px solid var(--border)">Peça</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:.5px solid var(--border)">Gama</th>
        ${forns.map(f=>`<th style="padding:8px 10px;text-align:right;border-bottom:.5px solid var(--border)">${f.nome}</th>`).join('')}

      ${todosCat.flatMap(p=>p.gamas.map(g=>{

function renderEncomenda() {
  const encomendas = EQUIPAMENTOS_DB.encomendas;

  // Tabela de itens a encomendar (agregado)
  const agregado = {};
  DB.atletas.forEach(a=>{
    const atr=EQUIPAMENTOS_DB.atribuicoes[a.id]||{};
    ['corrida','casual'].forEach(secao=>{
      Object.entries(atr[secao]||{}).forEach(([pecaId,d])=>{
        const peca=EQUIPAMENTOS_DB.getPeca(secao,pecaId);
        const gamaId=d.gama||(peca?.gamas[0]?.id||'');
        const gamaObj=EQUIPAMENTOS_DB.getGama(secao,pecaId,gamaId);
        if(!peca||!gamaObj) return;
        if(!peca.obrigatorio && !d.selecionado) return;
        const fornId=d.fornecedorId||(EQUIPAMENTOS_DB.fornecedores[0]?.id||'forn1');
        const preco=EQUIPAMENTOS_DB.getPreco(gamaObj,fornId);
        const key=secao+'|'+pecaId+'|'+gamaId+'|'+(d.tamanho||'')||'|'+fornId;
        if(!agregado[key]) agregado[key]={secao,peca,gamaObj,tamanho:d.tamanho||'',fornId,preco,obrig:peca.obrigatorio,count:0};
        agregado[key].count++;
      });
    });
  });

  const linhas=Object.values(agregado).sort((a,b)=>a.obrig===b.obrig?0:a.obrig?-1:1);

  document.getElementById('view-encomenda').innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem">
    <div style="font-size:14px;font-weight:600">📦 Encomendas (${encomendas.length})</div>
    <button class="btn-primary btn-sm" onclick="criarEncomenda()">+ Nova encomenda</button>
  </div>

  ${linhas.length?`<div class="sec" style="margin-bottom:1rem">
    <div class="sec-hd"><div class="sec-title">📋 Itens agregados</div></div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:var(--bg)"><th style="padding:6px 10px;text-align:left;border-bottom:.5px solid var(--border)">Peça</th><th style="padding:6px 10px;border-bottom:.5px solid var(--border)">Gama</th><th style="padding:6px 10px;border-bottom:.5px solid var(--border)">Tamanho</th><th style="padding:6px 10px;border-bottom:.5px solid var(--border)">Encargo</th><th style="padding:6px 10px;text-align:center;border-bottom:.5px solid var(--border)">Qtd</th><th style="padding:6px 10px;text-align:right;border-bottom:.5px solid var(--border)">P.Unit</th><th style="padding:6px 10px;text-align:right;border-bottom:.5px solid var(--border)">Subtotal</th></tr></thead>
      <tbody>
        ${linhas.map(l=>`<tr style="border-bottom:.5px solid var(--border)">
          <td style="padding:6px 10px">${l.peca.icone} ${l.peca.nome}</td>
          <td style="padding:6px 10px;color:var(--muted)">${l.gamaObj.nome}</td>
          <td style="padding:6px 10px;text-align:center"><span class="badge b-gray">${l.tamanho||'—'}</span></td>
          <td style="padding:6px 10px">${l.obrig?'<span class="badge b-info">Clube</span>':'<span class="badge b-warn">Atleta</span>'}</td>
          <td style="padding:6px 10px;text-align:center;font-weight:600">${l.count}</td>
          <td style="padding:6px 10px;text-align:right">${fmtEur(l.preco)}</td>
          <td style="padding:6px 10px;text-align:right;font-weight:600">${fmtEur(l.preco*l.count)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>
  </div>`:'<div style="text-align:center;padding:1.5rem;color:var(--hint)">Sem itens atribuídos ainda — começa por definir tamanhos na vista "Por atleta"</div>'}

  ${encomendas.length?`<div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.6rem">Registo de encomendas</div>`:''}
  ${encomendas.slice().reverse().map(enc=>{
    const forn=EQUIPAMENTOS_DB.getFornecedor(enc.fornecedorId);
    const fechada=enc.estado==='fechada';
    const totalEnc=enc.itens.reduce((s,i)=>s+(i.preco*i.count),0);
    return `<div class="enc-card" style="border-color:${fechada?'var(--green-bd)':'var(--border)'}">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-weight:700;color:var(--blue);min-width:90px;font-size:13px">${enc.ref}</div>
        <div style="flex:1">
          <div style="font-weight:500">${forn?forn.nome:'—'} · ${enc.data}</div>
          <div style="font-size:12px;color:var(--muted)">${enc.itens.length} linha(s) · ${fmtEur(totalEnc)}</div>
          ${enc.obs?`<div style="font-size:12px;color:var(--muted);font-style:italic">${enc.obs}</div>`:''}
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="badge ${fechada?'b-ok':'b-warn'}">${fechada?'🔒 Fechada':'Em aberto'}</span>
          ${!fechada?`<button class="btn-sm" onclick="editEncomenda('${enc.id}')">✏️ Editar</button>
          <button class="btn-sm btn-teal" onclick="fecharEncomenda('${enc.id}')">🔒 Fechar</button>`:''}
        </div>
      </div>
      ${enc._editando?`<div style="margin-top:.75rem;padding-top:.75rem;border-top:.5px solid var(--border)">
        <div class="fg"><label class="fl2" style="font-size:11px">Observações</label>
          <input type="text" id="eo-${enc.id}" value="${enc.obs||''}" placeholder="Notas para o fornecedor..." style="width:100%;padding:5px 8px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px"></div>
        <table style="width:100%;font-size:12px;margin-bottom:8px;border-collapse:collapse">
          <thead><tr style="background:var(--bg)"><th style="padding:4px 8px;text-align:left">Peça</th><th style="padding:4px 8px;text-align:center">Tam</th><th style="padding:4px 8px;text-align:center">Qtd</th><th style="padding:4px 8px;text-align:right">P.Unit</th><th style="padding:4px 8px"></th></tr></thead>
          <tbody>
            ${enc.itens.map((it,idx)=>`<tr><td style="padding:4px 8px">${it.nome}</td><td style="padding:4px 8px;text-align:center">${it.tamanho||'—'}</td>
              <td style="padding:4px 8px;text-align:center"><input type="number" min="0" value="${it.count}" style="width:55px;padding:3px 5px;border:.5px solid var(--border);border-radius:var(--rs);font-size:12px" onchange="updItemEnc('${enc.id}',${idx},this.value)"></td>
              <td style="padding:4px 8px;text-align:right">${fmtEur(it.preco)}</td>
              <td style="padding:4px 8px"><button class="btn-ghost btn-sm" style="color:var(--red);font-size:11px" onclick="delItemEnc('${enc.id}',${idx})">✕</button></td></tr>`).join('')}
          </tbody>
        </table>
        <div style="display:flex;gap:6px">
          <button class="btn-sm btn-green" onclick="saveEncomenda('${enc.id}')">✓ Guardar</button>
          <button class="btn-sm btn-ghost" onclick="cancelEditEnc('${enc.id}')">Cancelar</button>
        </div>
      </div>`:''}
    </div>`;
  }).join('')}`;
}

function criarEncomenda() {
  const fids=EQUIPAMENTOS_DB.fornecedores.map((f,i)=>`[${f.id}] ${f.nome}`).join('\n');
  const escolha=prompt('Fornecedor:\n\n'+fids+'\n\nEscreve o ID (ex: forn1):');
  if(!escolha) return;
  const forn=EQUIPAMENTOS_DB.getFornecedor(escolha.trim());
  if(!forn){toast('Fornecedor não encontrado');return;}
  const itens=[];
  DB.atletas.forEach(a=>{
    const atr=EQUIPAMENTOS_DB.atribuicoes[a.id]||{};
    ['corrida','casual'].forEach(secao=>{
      Object.entries(atr[secao]||{}).forEach(([pecaId,d])=>{
        if(d.fornecedorId&&d.fornecedorId!==escolha.trim()) return;
        const peca=EQUIPAMENTOS_DB.getPeca(secao,pecaId);
        const gamaId=d.gama||(peca?.gamas[0]?.id||'');
        const gamaObj=EQUIPAMENTOS_DB.getGama(secao,pecaId,gamaId);
        if(!peca||!gamaObj) return;
        if(!peca.obrigatorio&&!d.selecionado) return;
        const preco=EQUIPAMENTOS_DB.getPreco(gamaObj,escolha.trim());
        const key=pecaId+'|'+(d.tamanho||'')+'|'+gamaId;
        const ex=itens.find(i=>i.key===key);
        if(ex) ex.count++;
        else itens.push({key,nome:peca.nome,icone:peca.icone,tamanho:d.tamanho||'',gama:gamaId,preco,count:1});
      });
    });
  });
  if(!itens.length){toast('Sem itens para este fornecedor','warn');return;}
  const enc=EQUIPAMENTOS_DB.novaEncomenda(escolha.trim(),itens);
  toast('Encomenda '+enc.ref+' criada!','ok');
  renderEncomenda();
}

function editEncomenda(id){const e=EQUIPAMENTOS_DB.encomendas.find(x=>x.id===id);if(e&&e.estado!=='fechada'){e._editando=true;renderEncomenda();}}
function cancelEditEnc(id){const e=EQUIPAMENTOS_DB.encomendas.find(x=>x.id===id);if(e){e._editando=false;renderEncomenda();}}
function saveEncomenda(id){
  const e=EQUIPAMENTOS_DB.encomendas.find(x=>x.id===id);if(!e) return;
  const el=document.getElementById('eo-'+id);if(el) e.obs=el.value;
  e._editando=false;toast('Encomenda guardada!','ok');renderEncomenda();
}
function fecharEncomenda(id){
  const e=EQUIPAMENTOS_DB.encomendas.find(x=>x.id===id);if(!e) return;
  if(!confirm('Fechar '+e.ref+'? Não poderá ser editada.')) return;
  e.estado='fechada';e._editando=false;toast(e.ref+' fechada!','ok');renderEncomenda();
}
function updItemEnc(id,idx,v){const e=EQUIPAMENTOS_DB.encomendas.find(x=>x.id===id);if(e) e.itens[idx].count=parseInt(v)||0;}
function delItemEnc(id,idx){const e=EQUIPAMENTOS_DB.encomendas.find(x=>x.id===id);if(e){e.itens.splice(idx,1);renderEncomenda();}}

// ============================================================
// MODAIS + UTILS
// ============================================================
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function toast(msg,type=''){
  const el=document.getElementById('toast-el');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  setTimeout(()=>el.classList.remove('show'),2800);
}
