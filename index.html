:root{
  --red:#CC0000;--red-bg:#FFF0F0;--red-bd:rgba(204,0,0,.25);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-bd:rgba(24,95,165,.25);
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-bd:rgba(15,110,86,.25);
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-bd:rgba(133,79,11,.25);
  --green:#3B6D11;--green-bg:#EAF3DE;--green-bd:rgba(59,109,17,.25);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-bd:rgba(83,74,183,.25);
  --gray:#5F5E5A;--gray-bg:#F1EFE8;--gray-bd:rgba(95,94,90,.25);
  --bg:#F5F4F1;--surface:#fff;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1A1A1A;--muted:#666660;--hint:#9A9A94;
  --r:10px;--rs:6px;--sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--surface);border-right:.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sb-logo{padding:1.1rem 1rem .9rem;border-bottom:.5px solid var(--border)}
.sb-logo-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sb-icon{width:32px;height:32px;background:var(--red);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.sb-name{font-size:13px;font-weight:600;line-height:1.2}
.sb-season{font-size:11px;color:var(--hint);padding-left:40px}
.sb-nav{padding:.6rem .5rem;flex:1;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:600;color:var(--hint);letter-spacing:.08em;text-transform:uppercase;padding:.5rem .5rem .2rem;margin-top:.4rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.45rem .75rem;border-radius:var(--rs);cursor:pointer;color:var(--muted);font-size:13px;transition:background .1s,color .1s;text-decoration:none}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.nav-badge{margin-left:auto;background:var(--red-bg);color:var(--red);font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px}
.sb-foot{padding:.7rem 1rem;border-top:.5px solid var(--border);display:flex;align-items:center;gap:8px}
.ua{width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-title{font-size:16px;font-weight:600}
.tb-sub{font-size:12px;color:var(--muted);margin-top:1px}
.tb-actions{display:flex;gap:8px;align-items:center}
.content{padding:1.1rem 1.5rem;flex:1}

/* BADGES */
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-warn{background:var(--amber-bg);color:var(--amber)}
.b-danger{background:var(--red-bg);color:var(--red)}
.b-info{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:var(--gray-bg);color:var(--gray)}

/* BUTTONS */
button,.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rs);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:background .11s;font-family:inherit;white-space:nowrap;text-decoration:none}
button:hover,.btn:hover{background:var(--bg)}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff}
.btn-primary:hover{background:#AA0000}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-wa{background:#25D366;border-color:#25D366;color:#fff}

/* ÉPOCA SELECTOR */
.epoca-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.6rem 1rem;margin-bottom:1rem}
.ep-btn{font-size:12px;padding:3px 10px;border-radius:20px;border:.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .12s}
.ep-btn.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd);font-weight:500}

/* ALERTAS TOPO */
.alertas-topo{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.alerta-strip{display:flex;align-items:center;gap:10px;padding:.6rem .9rem;border-radius:var(--rs);font-size:12px}
.as-danger{background:var(--red-bg);border:.5px solid var(--red-bd)}
.as-warn{background:var(--amber-bg);border:.5px solid var(--amber-bd)}
.as-ok{background:var(--green-bg);border:.5px solid var(--green-bd)}
.as-info{background:var(--blue-bg);border:.5px solid var(--blue-bd)}

/* ANIVERSÁRIOS TOPO */
.bday-strip{background:var(--red-bg);border:.5px solid var(--red-bd);border-radius:var(--rs);padding:.6rem .9rem;display:flex;align-items:center;gap:10px;font-size:12px}

/* MÉTRICAS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1rem}
.metric{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;cursor:pointer;transition:border-color .1s}
.metric:hover{border-color:var(--border2)}
.metric-ico{font-size:20px;margin-bottom:4px}
.metric-val{font-size:24px;font-weight:700;line-height:1}
.metric-lbl{font-size:11px;color:var(--muted);margin-top:3px}
.metric-sub{font-size:11px;margin-top:2px}

/* GRID PRINCIPAL */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.main-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:1100px){.main-grid{grid-template-columns:1fr}.main-grid-3{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.main-grid-3{grid-template-columns:1fr}}

/* CARDS */
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-hd{padding:.75rem 1rem;border-bottom:.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.card-body{padding:.85rem 1rem}
.card-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border);font-size:12px}
.card-row:last-child{border-bottom:none}
.card-empty{text-align:center;padding:1rem;color:var(--hint);font-size:12px}

/* PRÓXIMAS CORRIDAS */
.corrida-row{display:flex;align-items:flex-start;gap:8px;padding:.5rem 0;border-bottom:.5px solid var(--border)}
.corrida-row:last-child{border-bottom:none}
.corrida-data{font-size:11px;color:var(--muted);min-width:38px;padding-top:2px}
.corrida-nome{font-size:13px;font-weight:500;color:var(--text)}
.corrida-meta{font-size:11px;color:var(--muted);margin-top:1px}

/* MÓDULOS GRID */
.modulos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:1rem}
.modulo-btn{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.85rem 1rem;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .12s;text-decoration:none;color:var(--text)}
.modulo-btn:hover{background:var(--bg);border-color:var(--border2)}
.mod-ico{width:34px;height:34px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mod-nome{font-size:13px;font-weight:500}
.mod-sub{font-size:11px;color:var(--muted);margin-top:1px}
.m-blue{background:var(--blue-bg)}
.m-teal{background:var(--teal-bg)}
.m-amber{background:var(--amber-bg)}
.m-green{background:var(--green-bg)}
.m-purple{background:var(--purple-bg)}
.m-red{background:var(--red-bg)}
.m-gray{background:var(--gray-bg)}

/* SALDO BAR */
.saldo-bar{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:1rem}
.saldo-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.75rem}
.saldo-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.saldo-lbl{font-size:12px;color:var(--muted);min-width:120px}
.saldo-track{flex:1;height:14px;background:var(--bg);border-radius:3px;overflow:hidden}
.saldo-fill{height:100%;border-radius:3px}
.saldo-val{font-size:12px;font-weight:600;min-width:70px;text-align:right}

/* AV */
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.av-blue{background:var(--blue-bg);color:var(--blue)}
.av-teal{background:var(--teal-bg);color:var(--teal)}
.av-amber{background:var(--amber-bg);color:var(--amber)}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:.55rem .95rem;border-radius:var(--rs);font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
.toast.warn{background:var(--amber)}

    const ext = this.receitas.filter(r=>r.recebido).reduce((s,r)=>s+r.valor,0);
    return {mensalidades:mens, externas:ext, total:mens+ext};

    const rec = this.totalReceitas();
    const desp = this.totalDespesas();
    return rec.total - desp;

    if(!pat.contactos.length) return 999;
    const ultimo = pat.contactos.sort((a,b)=>b.data.localeCompare(a.data))[0];

    const hoje = new Date();
    return Math.floor((hoje-d)/86400000);

  getProvasEpoca(ano) {
    if (ano === 2026) return this.escola_provas;
    if (ano === 2027) return this.provas_2027;
    return [];
  },

  getProvasMes(ano, mes) {
    const todas = this.getProvasEpoca(ano);
    return todas.filter(p => {
      const d = new Date(p.data);
      return d.getFullYear() === ano && d.getMonth() === mes;
    });
  },

  getProvasSemana(ano, inicioSemana) {
    const fim = new Date(inicioSemana);
    fim.setDate(fim.getDate() + 6);
    const todas = this.getProvasEpoca(ano);
    return todas.filter(p => {
      const d = new Date(p.data);
      return d >= inicioSemana && d <= fim;
    });
  }
};

<script>
// ============================================================
// UTILS
// ============================================================
function fmtEur(v){return v.toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2})+'€'}
function fmtDate(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'})}
function initials(n){return n.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(x=>x[0]).join('').toUpperCase()}
function calcAge(nasc){const d=new Date(nasc),t=new Date();let a=t.getFullYear()-d.getFullYear();if(t<new Date(t.getFullYear(),d.getMonth(),d.getDate()))a--;return a}
function escalaoLabel(ep){if(!ep)return'—';if(ep.escalao==='escolas')return'Escolas'+(ep.subescalao?' / '+ep.subescalao.toUpperCase():'');return ep.escalao.toUpperCase()}
function avColor(esc){if(esc==='sub23'||esc==='paraciclismo')return'amber';if(esc==='sub17'||esc==='sub19')return'blue';return'teal'}

// ============================================================
// COCKPIT RENDER
// ============================================================
function renderCockpit() {
  const ano = DB.epoca_atual;
  const hoje = new Date();

  // --- DATA TOPO ---
  document.getElementById('tb-date').textContent =
    hoje.toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // --- ATLETAS ---
  const atletas = DB.atletas.filter(a=>{const e=a.epocas[ano];return e&&e.estado==='ativo'});
  const cedidos = atletas.filter(a=>a.epocas[ano].tipo==='cedido');
  const mensAtraso = atletas.filter(a=>{
    const regs = FINANCEIRA_DB.mensalidades[a.id]||[];
    const cfg = FINANCEIRA_DB.getConfigEpoca(ano);
    return cfg.meses_ativos.some(m=>!regs.find(r=>r.mes===m&&r.ano===ano&&r.pago));
  });
  const docsEmFalta = DB.atletas.filter(a=>!a.doc_seguro||!a.doc_medico);

  // --- ANIVERSÁRIOS ---
  const anivHoje = DB.atletas.filter(a=>{
    const d=new Date(a.nasc);
    return d.getMonth()===hoje.getMonth()&&d.getDate()===hoje.getDate();
  });
  const staffAnivHoje = STAFF_DB.membros.filter(m=>{
    const d=new Date(m.nasc);
    return d.getMonth()===hoje.getMonth()&&d.getDate()===hoje.getDate();
  });
  const todosAnivHoje = [...anivHoje, ...staffAnivHoje];

  // --- CALENDÁRIO ---
  const provasEpoca = CALENDARIO.escola_provas||[];
  const proximas = provasEpoca
    .filter(p=>new Date(p.data)>=hoje)
    .sort((a,b)=>a.data.localeCompare(b.data))
    .slice(0,4);
  const semConvocatoria = proximas.filter(p=>Object.values(p.convocados||{}).flat().length===0);

  // --- FINANCEIRA ---
  const rec = FINANCEIRA_DB.totalReceitas();
  const desp = FINANCEIRA_DB.totalDespesas();
  const saldo = rec.total - desp;
  const recPend = FINANCEIRA_DB.receitas.filter(r=>!r.recebido).reduce((s,r)=>s+r.valor,0);

  // --- PATROCINADORES ---
  const pats = PATROCINADORES_DB.patrocinadores;
  const patsAtivos = pats.filter(p=>p.estado==='ativo');
  const patsSemContacto = patsAtivos.filter(p=>PATROCINADORES_DB.diasSemContacto(p)>60);
  const patsApoioPend = patsAtivos.filter(p=>p.apoios.some(a=>a.estado==='pendente'));

  // --- STAFF ---
  const certAlertas = STAFF_DB.getCertsAlerta();

  // --- RENDER ---
  document.getElementById('cockpit-content').innerHTML = `

  <!-- ANIVERSÁRIOS DO DIA -->
  ${todosAnivHoje.length ? `
  <div class="bday-strip" style="margin-bottom:1rem">
    <span style="font-size:20px">🎂</span>
    <span style="font-weight:600">Aniversário${todosAnivHoje.length>1?'s':''} hoje:</span>
    ${todosAnivHoje.map(p=>`<span class="badge b-danger">${p.nome.split(' ')[0]} — ${calcAge(p.nasc)} anos</span>`).join('')}
    <div style="flex:1"></div>
    <a href="comunicacoes_standalone.html" class="btn btn-wa btn-sm">🎂 Enviar parabéns</a>
  </div>` : ''}

  <!-- ALERTAS CRÍTICOS -->
  <div class="alertas-topo">
    ${mensAtraso.length ? `<div class="alerta-strip as-danger">
      ⚠️ <strong>${mensAtraso.length} atleta(s)</strong> com mensalidades em atraso
      <div style="flex:1"></div>
      <a href="financeira_standalone.html" class="btn btn-sm">Ver →</a>
    </div>` : ''}
    ${semConvocatoria.length ? `<div class="alerta-strip as-warn">
      🏁 <strong>${semConvocatoria.length} corrida(s)</strong> sem convocatória definida
      <div style="flex:1"></div>
      <a href="calendario_standalone.html" class="btn btn-sm">Ver →</a>
    </div>` : ''}
    ${patsSemContacto.length ? `<div class="alerta-strip as-warn">
      🤝 <strong>${patsSemContacto.length} patrocinador(es)</strong> sem contacto há mais de 60 dias
      <div style="flex:1"></div>
      <a href="patrocinadores_standalone.html" class="btn btn-sm">Ver →</a>
    </div>` : ''}
    ${certAlertas.length ? `<div class="alerta-strip as-warn">
      🪪 <strong>${certAlertas.length} certificação(ões)</strong> de staff expiradas ou a vencer
      <div style="flex:1"></div>
      <a href="staff_standalone.html" class="btn btn-sm">Ver →</a>
    </div>` : ''}
    ${docsEmFalta.length ? `<div class="alerta-strip as-warn">
      📄 <strong>${docsEmFalta.length} atleta(s)</strong> com documentos em falta
      <div style="flex:1"></div>
      <a href="atletas_standalone.html" class="btn btn-sm">Ver →</a>
    </div>` : ''}
  </div>

  <!-- MÉTRICAS PRINCIPAIS -->
  <div class="metrics-grid">
    <a href="atletas_standalone.html" class="metric" style="text-decoration:none;color:inherit">
      <div class="metric-ico">👥</div>
      <div class="metric-val">${atletas.length}</div>
      <div class="metric-lbl">Atletas ativos</div>
      <div class="metric-sub" style="color:var(--muted)">${cedidos.length} cedido(s)</div>
    </a>
    <a href="financeira_standalone.html" class="metric" style="text-decoration:none;color:inherit">
      <div class="metric-ico">💰</div>
      <div class="metric-val" style="color:${saldo>=0?'var(--green)':'var(--red)'}; font-size:18px">${fmtEur(Math.abs(saldo))}</div>
      <div class="metric-lbl">Saldo época</div>
      <div class="metric-sub" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${saldo>=0?'▲ Positivo':'▼ Negativo'}</div>
    </a>
    <a href="financeira_standalone.html" class="metric" style="text-decoration:none;color:inherit">
      <div class="metric-ico">⚠️</div>
      <div class="metric-val" style="color:${mensAtraso.length?'var(--red)':'var(--green)'}">${mensAtraso.length}</div>
      <div class="metric-lbl">Mensalidades em atraso</div>
      <div class="metric-sub" style="color:var(--muted)">atletas</div>
    </a>
    <a href="calendario_standalone.html" class="metric" style="text-decoration:none;color:inherit">
      <div class="metric-ico">📅</div>
      <div class="metric-val">${proximas.length}</div>
      <div class="metric-lbl">Próximas corridas</div>
      <div class="metric-sub" style="color:var(--muted)">${proximas[0]?fmtDate(proximas[0].data):'—'}</div>
    </a>
    <a href="patrocinadores_standalone.html" class="metric" style="text-decoration:none;color:inherit">
      <div class="metric-ico">🤝</div>
      <div class="metric-val">${patsAtivos.length}</div>
      <div class="metric-lbl">Patrocinadores ativos</div>
      <div class="metric-sub" style="color:${patsApoioPend.length?'var(--amber)':'var(--muted)'}">${patsApoioPend.length} apoio(s) pendente(s)</div>
    </a>
    <a href="staff_standalone.html" class="metric" style="text-decoration:none;color:inherit">
      <div class="metric-ico">🪪</div>
      <div class="metric-val">${STAFF_DB.getAtivos().length}</div>
      <div class="metric-lbl">Staff ativo</div>
      <div class="metric-sub" style="color:${certAlertas.length?'var(--amber)':'var(--muted)'}">${certAlertas.length} alerta(s) cert.</div>
    </a>
  </div>

  <!-- LINHA 2: corridas + mensalidades em atraso -->
  <div class="main-grid">
    <div class="card">
      <div class="card-hd">
        <div class="card-title">📅 Próximas corridas</div>
        <a href="calendario_standalone.html" class="btn btn-ghost btn-sm">Ver todas →</a>
      </div>
      <div class="card-body">
        ${!proximas.length ? '<div class="card-empty">Sem corridas próximas</div>' :
          proximas.map(p=>{
            const conv=Object.values(p.convocados||{}).flat().length;
            const diasAte=Math.ceil((new Date(p.data)-hoje)/86400000);
            return `<div class="corrida-row">
              <div class="corrida-data">${diasAte===0?'Hoje':diasAte===1?'Amanhã':diasAte+'d'}</div>
              <div style="flex:1">
                <div class="corrida-nome">${p.nome}</div>
                <div class="corrida-meta">
                  ${p.escaloes.map(e=>`<span class="badge b-info" style="font-size:10px">${e.toUpperCase()}</span>`).join(' ')}
                  ${conv?`· ${conv} convocados`:'<span class="badge b-warn" style="font-size:10px">Sem convocatória</span>'}
                </div>
              </div>
              <span class="badge ${p.estado==='confirmado'?'b-ok':'b-warn'}">${p.estado}</span>
            </div>`;
          }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <div class="card-title">⚠️ Mensalidades em atraso</div>
        <a href="financeira_standalone.html" class="btn btn-ghost btn-sm">Ver todas →</a>
      </div>
      <div class="card-body">
        ${!mensAtraso.length ? '<div class="card-empty" style="color:var(--green)">✓ Sem atrasos!</div>' :
          mensAtraso.slice(0,5).map(a=>{
            const ep=a.epocas[ano];
            const t=FINANCEIRA_DB.totalMensalidadesAtleta(a.id,ano);
            return `<div class="card-row">
              <div class="av av-${avColor(ep?.escalao||'')}">${initials(a.nome)}</div>
              <span style="flex:1;font-weight:500">${a.nome}</span>
              <span style="color:var(--muted);font-size:11px">${escalaoLabel(ep)}</span>
              <span class="badge b-danger">${fmtEur(t.pendente)}</span>
            </div>`;
          }).join('')}
        ${mensAtraso.length>5?`<div style="text-align:center;padding:.5rem;font-size:11px;color:var(--muted)">+${mensAtraso.length-5} mais</div>`:''}
      </div>
    </div>
  </div>

  <!-- LINHA 3: saldo financeiro + patrocinadores + staff -->
  <div class="main-grid-3">
    <div class="card">
      <div class="card-hd">
        <div class="card-title">💰 Financeira ${ano}</div>
        <a href="financeira_standalone.html" class="btn btn-ghost btn-sm">Detalhe →</a>
      </div>
      <div class="card-body">
        <div class="saldo-bar" style="border:none;padding:0;background:transparent">
          <div class="saldo-row">
            <div class="saldo-lbl">📥 Receitas</div>
            <div class="saldo-track"><div class="saldo-fill" style="width:100%;background:var(--green)"></div></div>
            <div class="saldo-val" style="color:var(--green)">${fmtEur(rec.total)}</div>
          </div>
          <div class="saldo-row">
            <div class="saldo-lbl">📤 Despesas</div>
            <div class="saldo-track"><div class="saldo-fill" style="width:${Math.min(100,Math.round((desp/rec.total)*100))}%;background:var(--red)"></div></div>
            <div class="saldo-val" style="color:var(--red)">${fmtEur(desp)}</div>
          </div>
          <div class="saldo-row">
            <div class="saldo-lbl">⏳ Por receber</div>
            <div class="saldo-track"><div class="saldo-fill" style="width:${Math.min(100,Math.round((recPend/rec.total)*100))}%;background:var(--amber)"></div></div>
            <div class="saldo-val" style="color:var(--amber)">${fmtEur(recPend)}</div>
          </div>
        </div>
        <div style="margin-top:.75rem;padding:.6rem;background:${saldo>=0?'var(--green-bg)':'var(--red-bg)'};border-radius:var(--rs);text-align:center">
          <div style="font-size:18px;font-weight:700;color:${saldo>=0?'var(--green)':'var(--red)'}">${saldo>=0?'+':''}${fmtEur(saldo)}</div>
          <div style="font-size:11px;color:var(--muted)">Saldo atual</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <div class="card-title">🤝 Patrocinadores</div>
        <a href="patrocinadores_standalone.html" class="btn btn-ghost btn-sm">Ver →</a>
      </div>
      <div class="card-body">
        ${patsAtivos.map(p=>{
          const t=PATROCINADORES_DB.totalApoios(p);
          const dias=PATROCINADORES_DB.diasSemContacto(p);
          return `<div class="card-row">
            <span style="font-size:16px">${p.logo}</span>
            <span style="flex:1;font-weight:500">${p.nome}</span>
            <div style="text-align:right">
              <div style="font-size:12px;font-weight:600;color:var(--green)">${fmtEur(t.recebido)}</div>
              ${t.pendente?`<div style="font-size:10px;color:var(--amber)">+${fmtEur(t.pendente)} pend.</div>`:''}
              ${dias>60?`<div style="font-size:10px;color:var(--red)">${dias}d sem contacto</div>`:''}
            </div>
          </div>`;
        }).join('')}
        ${PATROCINADORES_DB.patrocinadores.filter(p=>p.estado==='negociacao').map(p=>`
          <div class="card-row">
            <span style="font-size:16px">${p.logo}</span>
            <span style="flex:1;font-weight:500">${p.nome}</span>
            <span class="badge b-warn">Negociação</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-hd">

function toast(msg,type=''){
  const el=document.getElementById('toast-el');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  setTimeout(()=>el.classList.remove('show'),2800);
}
