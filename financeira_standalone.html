<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeira — Escola de Ciclismo</title>
<style>
:root{
  --red:#CC0000;--red-bg:#FFF0F0;--red-bd:rgba(204,0,0,.25);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-bd:rgba(24,95,165,.25);
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-bd:rgba(15,110,86,.25);
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-bd:rgba(133,79,11,.25);
  --green:#3B6D11;--green-bg:#EAF3DE;--green-bd:rgba(59,109,17,.25);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-bd:rgba(83,74,183,.25);
  --gray:#5F5E5A;--gray-bg:#F1EFE8;--gray-bd:rgba(95,94,90,.25);
  --bg:#F5F4F1;--surface:#fff;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1A1A1A;--muted:#666660;--hint:#9A9A94;
  --r:10px;--rs:6px;--sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--surface);border-right:.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sb-logo{padding:1.1rem 1rem .9rem;border-bottom:.5px solid var(--border)}
.sb-logo-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sb-icon{width:32px;height:32px;background:var(--red);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.sb-name{font-size:13px;font-weight:600;line-height:1.2}
.sb-season{font-size:11px;color:var(--hint);padding-left:40px}
.sb-nav{padding:.6rem .5rem;flex:1;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:600;color:var(--hint);letter-spacing:.08em;text-transform:uppercase;padding:.5rem .5rem .2rem;margin-top:.4rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.45rem .75rem;border-radius:var(--rs);cursor:pointer;color:var(--muted);font-size:13px;transition:background .1s,color .1s;text-decoration:none}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.nav-badge{margin-left:auto;background:var(--red-bg);color:var(--red);font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px}
.sb-foot{padding:.7rem 1rem;border-top:.5px solid var(--border);display:flex;align-items:center;gap:8px}
.ua{width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-title{font-size:16px;font-weight:600}
.tb-sub{font-size:12px;color:var(--muted);margin-top:1px}
.tb-actions{display:flex;gap:8px}
.content{padding:1.1rem 1.5rem;flex:1}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--rs);padding:3px;border:.5px solid var(--border);margin-bottom:1.1rem;width:fit-content}
.tab{padding:6px 14px;border-radius:4px;font-size:13px;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .12s;font-family:inherit;white-space:nowrap}
.tab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* BADGES */
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-warn{background:var(--amber-bg);color:var(--amber)}
.b-danger{background:var(--red-bg);color:var(--red)}
.b-info{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:var(--gray-bg);color:var(--gray)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-teal{background:var(--teal-bg);color:var(--teal)}

/* BUTTONS */
button,.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rs);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:background .11s;font-family:inherit;white-space:nowrap}
button:hover,.btn:hover{background:var(--bg)}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff}
.btn-primary:hover{background:#AA0000}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#fff}
.btn-green{background:var(--green);border-color:var(--green);color:#fff}
.btn-green:hover{background:#2d5509}

select,input,textarea{padding:7px 9px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--surface);color:var(--text);outline:none;font-family:inherit}
select:focus,input:focus,textarea:focus{border-color:var(--blue)}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:1.1rem}
.dash-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1rem}
.dash-label{font-size:11px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.dash-val{font-size:26px;font-weight:700;line-height:1}
.dash-sub{font-size:11px;color:var(--muted);margin-top:4px}
.dash-ok{color:var(--green)}
.dash-warn{color:var(--amber)}
.dash-danger{color:var(--red)}

/* GRÁFICO SIMPLES */
.bar-chart{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:1.1rem}
.bar-title{font-size:13px;font-weight:600;margin-bottom:.85rem}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.bar-lbl{font-size:12px;color:var(--muted);min-width:70px;text-align:right}
.bar-track{flex:1;height:18px;background:var(--bg);border-radius:3px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-val{font-size:11px;font-weight:600;min-width:60px;text-align:right}

/* SECÇÃO */
.sec{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.1rem}
.sec-hd{padding:.75rem 1rem;border-bottom:.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between}
.sec-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.sec-body{padding:1rem}

/* TABELAS */
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;font-weight:600;color:var(--muted);text-align:left;padding:8px 12px;border-bottom:.5px solid var(--border);background:var(--bg);text-transform:uppercase;letter-spacing:.04em}
tbody tr{border-bottom:.5px solid var(--border);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
td{padding:8px 12px;vertical-align:middle;font-size:13px}
.tbl-foot{padding:7px 12px;font-size:11px;color:var(--muted);border-top:.5px solid var(--border);text-align:right;background:var(--bg)}

/* MENSALIDADES GRID */
.mens-grid{display:grid;grid-template-columns:220px 1fr;gap:1rem}
.atleta-list{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden;max-height:600px;overflow-y:auto}
.atleta-row{display:flex;align-items:center;gap:8px;padding:.6rem .85rem;border-bottom:.5px solid var(--border);cursor:pointer;transition:background .1s}
.atleta-row:last-child{border-bottom:none}
.atleta-row:hover{background:var(--bg)}
.atleta-row.active{background:var(--blue-bg)}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.av-blue{background:var(--blue-bg);color:var(--blue)}
.av-teal{background:var(--teal-bg);color:var(--teal)}
.av-amber{background:var(--amber-bg);color:var(--amber)}

/* MESES GRID */
.meses-wrap{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r)}
.meses-header{padding:.75rem 1rem;border-bottom:.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between}
.meses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:1rem}
.mes-card{border:.5px solid var(--border);border-radius:var(--rs);padding:.7rem .85rem;transition:all .12s}
.mes-card.pago{background:var(--green-bg);border-color:var(--green-bd)}
.mes-card.pendente{background:var(--amber-bg);border-color:var(--amber-bd)}
.mes-card.inativo{background:var(--bg);border-color:var(--border);opacity:.5}
.mes-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px}
.mes-valor{font-size:16px;font-weight:700}
.mes-info{font-size:11px;color:var(--muted);margin-top:3px}
.mes-btn{margin-top:6px}

/* ALERTAS */
.alerta-box{background:var(--red-bg);border:.5px solid var(--red-bd);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:1.1rem}
.alerta-title{font-size:12px;font-weight:600;color:var(--red);margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.alerta-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;border-bottom:.5px solid rgba(204,0,0,.1)}
.alerta-row:last-child{border-bottom:none}

/* CONFIG */
.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.mes-toggle{display:flex;gap:5px;flex-wrap:wrap}
.mes-pill{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .15s;font-weight:500}
.mes-pill.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:600;box-shadow:0 2px 6px rgba(24,95,165,.3)}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r);width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;margin:1rem}
.modal-hd{padding:.9rem 1.1rem;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600}
.modal-body{flex:1;overflow-y:auto;padding:1.1rem}
.modal-foot{padding:.8rem 1.1rem;border-top:.5px solid var(--border);display:flex;gap:7px;justify-content:flex-end;flex-shrink:0}
.fg{margin-bottom:.8rem}
.fl2{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:3px;display:block}
.fi{width:100%;padding:7px 9px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px}
.fi:focus{border-color:var(--blue)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-box{padding:.65rem .85rem;border-radius:var(--rs);font-size:12px;margin-bottom:.8rem}
.ib-blue{background:var(--blue-bg);color:var(--blue)}
.ib-green{background:var(--green-bg);color:var(--green)}
.ib-warn{background:var(--amber-bg);color:var(--amber)}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:.55rem .95rem;border-radius:var(--rs);font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
.toast.warn{background:var(--amber)}
</style>
</head>

<script>
// ============================================================
// STATE
// ============================================================
let CURRENT_TAB = 'dashboard';
let CURRENT_ATLETA_MENS = null;
let PAG_CONTEXT = null; // {atletaId, mes, ano}

// ============================================================
// UTILS
// ============================================================
function fmtEur(v) { return v.toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}) + '€'; }
function fmtDate(d) { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function initials(n) { return n.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(x=>x[0]).join('').toUpperCase(); }
function avColor(escalao) {
  if(escalao==='sub23'||escalao==='paraciclismo') return 'amber';
  if(escalao==='sub17'||escalao==='sub19') return 'blue';
  return 'teal';
}
function escalaoLabel(ep) {
  if(!ep) return '—';
  if(ep.escalao==='escolas') return 'Escolas'+(ep.subescalao?' / '+ep.subescalao.toUpperCase():'');
  return ep.escalao.toUpperCase();
}

// ============================================================
// TABS
// ============================================================
function openTab(tab) {
  CURRENT_TAB = tab;
  ['dashboard','mensalidades','despesas','receitas','config'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('content-'+t).style.display = t===tab ? 'block' : 'none';
  });
  if(tab==='dashboard') renderDashboard();
  else if(tab==='mensalidades') renderMensalidades();
  else if(tab==='despesas') renderDespesas();
  else if(tab==='receitas') renderReceitas();
  else if(tab==='config') renderConfig();
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const ano = FINANCEIRA_DB.epoca_atual;
  const rec = FINANCEIRA_DB.totalReceitas();
  const desp = FINANCEIRA_DB.totalDespesas();
  const saldo = rec.total - desp;

  // Mensalidades em atraso
  const alertas = [];
  DB.atletas.forEach(a=>{
    const ep = a.epocas[ano];
    if(!ep || ep.estado !== 'ativo') return;
    const t = FINANCEIRA_DB.totalMensalidadesAtleta(a.id, ano);
    if(t.pendente > 0) alertas.push({atleta:a, total:t});
  });

  // Receitas pendentes
  const recPend = FINANCEIRA_DB.receitas.filter(r=>!r.recebido);

  // Despesas por tipo
  const despPorTipo = {};
  FINANCEIRA_DB.despesas.forEach(d=>{
    if(!despPorTipo[d.tipo]) despPorTipo[d.tipo] = 0;
    despPorTipo[d.tipo] += d.valor;
  });
  const despSorted = Object.entries(despPorTipo).sort((a,b)=>b[1]-a[1]);

  document.getElementById('content-dashboard').innerHTML = `
  ${alertas.length ? `
  <div class="alerta-box">
    <div class="alerta-title">⚠️ Mensalidades em atraso — ${alertas.length} atleta(s)</div>
    ${alertas.map(({atleta:a, total:t})=>`
      <div class="alerta-row">
        <div class="av av-${avColor(a.epocas[ano]?.escalao||'')}">${initials(a.nome)}</div>
        <span style="flex:1;font-weight:500">${a.nome}</span>
        <span style="color:var(--muted);font-size:12px">${escalaoLabel(a.epocas[ano])}</span>
        <span class="badge b-danger">${fmtEur(t.pendente)} em falta</span>
        <button class="btn-sm btn-ghost" onclick="openTab('mensalidades');selectAtleta(${a.id})">Ver →</button>
        <button class="btn-sm" onclick="enviarAlertaWA('${a.nome}',${t.pendente})">📱 Alertar</button>
      </div>`).join('')}
  </div>` : ''}

  <div class="dash-grid">
    <div class="dash-card">
      <div class="dash-label">💰 Saldo época</div>
      <div class="dash-val ${saldo>=0?'dash-ok':'dash-danger'}">${fmtEur(Math.abs(saldo))}</div>
      <div class="dash-sub">${saldo>=0?'▲ Saldo positivo':'▼ Saldo negativo'}</div>
    </div>
    <div class="dash-card">
      <div class="dash-label">📥 Receitas totais</div>
      <div class="dash-val dash-ok">${fmtEur(rec.total)}</div>
      <div class="dash-sub">Mens: ${fmtEur(rec.mensalidades)} · Ext: ${fmtEur(rec.externas)}</div>
    </div>
    <div class="dash-card">
      <div class="dash-label">📤 Despesas totais</div>
      <div class="dash-val dash-danger">${fmtEur(desp)}</div>
      <div class="dash-sub">${FINANCEIRA_DB.despesas.length} registos</div>
    </div>
    <div class="dash-card">
      <div class="dash-label">⏳ Mensalidades pendentes</div>
      <div class="dash-val dash-warn">${fmtEur(alertas.reduce((s,{total:t})=>s+t.pendente,0))}</div>
      <div class="dash-sub">${alertas.length} atleta(s) em atraso</div>
    </div>
    <div class="dash-card">
      <div class="dash-label">⏳ Receitas por receber</div>
      <div class="dash-val dash-warn">${fmtEur(recPend.reduce((s,r)=>s+r.valor,0))}</div>
      <div class="dash-sub">${recPend.length} pendente(s)</div>
    </div>
    <div class="dash-card">
      <div class="dash-label">🧾 Comprovativos em falta</div>
      <div class="dash-val">${FINANCEIRA_DB.despesas.filter(d=>!d.comprovativo).length}</div>
      <div class="dash-sub">despesas sem comprovativo</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
    <div class="bar-chart">
      <div class="bar-title">📤 Despesas por tipo</div>
      ${despSorted.map(([tipo,val])=>{
        const t = FINANCEIRA_DB.getTipoDespesa(tipo);
        const pct = Math.round((val/desp)*100);
        return `<div class="bar-row">
          <div class="bar-lbl">${t?.icone||''} ${t?.nome||tipo}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--red)"></div></div>
          <div class="bar-val" style="color:var(--red)">${fmtEur(val)}</div>
        </div>`;
      }).join('')}
    </div>

  document.querySelectorAll('.atleta-row').forEach(r=>r.classList.remove('active'));

  rows.forEach(r=>{ if(r.onclick?.toString().includes('selectAtleta('+id+')')) r.classList.add('active'); });

}

function openModalPagamento(atletaId, mes, ano, valor) {
  PAG_CONTEXT = {atletaId, mes, ano, valor};
  const nomes = FINANCEIRA_DB.getMeses();
  const a = DB.atletas.find(x=>x.id===atletaId);
  document.getElementById('modal-pag-title').textContent = `Registar pagamento — ${nomes[mes-1]} ${ano}`;
  document.getElementById('modal-pag-body').innerHTML = `
    <div class="info-box ib-blue">${a.nome} · ${nomes[mes-1]} ${ano} · ${fmtEur(valor)}</div>
    <div class="f2">
      <div class="fg"><label class="fl2">Data do pagamento</label><input type="date" class="fi" id="pag-data" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="fg"><label class="fl2">Valor (€)</label><input type="number" step="0.01" class="fi" id="pag-valor" value="${valor}"></div>
    </div>
    <div class="fg"><label class="fl2">Método de pagamento</label>
      <select class="fi" id="pag-metodo">
        ${FINANCEIRA_DB.METODOS.map(m=>`<option value="${m.id}">${m.icone} ${m.nome}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><label class="fl2">Registado por *</label>
      <select class="fi" id="pag-user">
        ${FINANCEIRA_DB.UTILIZADORES.map(u=>`<option value="${u.id}">${u.nome}</option>`).join('')}
      </select>
    </div>
    <div class="fg"><label class="fl2">Observações</label><input type="text" class="fi" id="pag-obs" placeholder="opcional"></div>
  `;
  openModal('modal-pag');
}

function confirmarPagamento() {
  const {atletaId, mes, ano} = PAG_CONTEXT;
  const data = document.getElementById('pag-data').value;
  const valor = parseFloat(document.getElementById('pag-valor').value);
  const metodo = document.getElementById('pag-metodo').value;
  const userId = document.getElementById('pag-user')?.value || 'jp_serra';
  const userName = FINANCEIRA_DB.getUtilizador(userId)?.nome || userId;
  const obs = document.getElementById('pag-obs').value;

  if(!FINANCEIRA_DB.mensalidades[atletaId]) FINANCEIRA_DB.mensalidades[atletaId] = [];
  const idx = FINANCEIRA_DB.mensalidades[atletaId].findIndex(r=>r.mes===mes&&r.ano===ano);
  const reg = {mes, ano, valor, pago:true, dataPagamento:data, metodo, registadoPor:userName, obs};
  if(idx>=0) FINANCEIRA_DB.mensalidades[atletaId][idx] = reg;
  else FINANCEIRA_DB.mensalidades[atletaId].push(reg);

  closeModal('modal-pag');
  toast('Pagamento registado!','ok');
  renderMensDetalhe();
  if(CURRENT_TAB==='dashboard') renderDashboard();
}

function desmarcarPago(atletaId, mes, ano) {
  const regs = FINANCEIRA_DB.mensalidades[atletaId] || [];
  const idx = regs.findIndex(r=>r.mes===mes&&r.ano===ano);
  if(idx>=0) { regs[idx].pago=false; regs[idx].dataPagamento=''; regs[idx].metodo=''; }
  toast('Pagamento anulado','warn');
  renderMensDetalhe();
}

function pagarTodas(atletaId, ano) {
  const meses = FINANCEIRA_DB.getMensalidadesAtleta(atletaId, ano);
  const cfg = FINANCEIRA_DB.getConfigEpoca(ano);
  const a = DB.atletas.find(x=>x.id===atletaId);
  const ep = a.epocas[ano];
  const valorBase = cfg.valores_escalao[ep.escalao] || 0;
  if(!FINANCEIRA_DB.mensalidades[atletaId]) FINANCEIRA_DB.mensalidades[atletaId] = [];
  meses.filter(m=>!m.pago).forEach(m=>{
    const idx = FINANCEIRA_DB.mensalidades[atletaId].findIndex(r=>r.mes===m.mes&&r.ano===ano);
    const reg = {mes:m.mes, ano, valor:valorBase, pago:true, dataPagamento:new Date().toISOString().split('T')[0], metodo:'transferencia', obs:'Marcado em lote'};
    if(idx>=0) FINANCEIRA_DB.mensalidades[atletaId][idx]=reg;
    else FINANCEIRA_DB.mensalidades[atletaId].push(reg);
  });
  toast('Todas as mensalidades marcadas como pagas!','ok');
  renderMensalidades();
}

function enviarAlertaWA(nome, pendente) {
  const msg = encodeURIComponent(`Caro(a) Encarregado(a),\n\nVimos informar que existem mensalidades em atraso referentes ao atleta *${nome}*, no valor total de *${fmtEur(pendente)}*.\n\nPor favor regularize a situação com a brevidade possível.\n\nObrigado,\nEscola de Ciclismo de Formação 🚴`);
  window.open('https://wa.me/?text='+msg,'_blank');
  toast('Mensagem pronta para enviar!','ok');
}

function toggleMes(mes, el) {
  const cfg = FINANCEIRA_DB.getConfigEpoca(FINANCEIRA_DB.epoca_atual);

  if(idx>=0) cfg.meses_ativos.splice(idx,1);
  else cfg.meses_ativos.push(mes);
  cfg.meses_ativos.sort((a,b)=>a-b);
  el.classList.toggle('active');
  document.querySelector('#content-config .mes-toggle + div').textContent = 'Meses ativos: '+cfg.meses_ativos.length;
  toast('Meses atualizados','ok');
}

function updateValorEscalao(esc, val) {
  FINANCEIRA_DB.config_epoca[FINANCEIRA_DB.epoca_atual].valores_escalao[esc] = parseFloat(val) || 0;
}

// ============================================================
// MODAIS DESPESA/RECEITA
// ============================================================
function openModalDespesa() {
  document.getElementById('desp-tipo').innerHTML = FINANCEIRA_DB.TIPOS_DESPESA.map(t=>`<option value="${t.id}">${t.icone} ${t.nome}</option>`).join('');
  document.getElementById('desp-prova').innerHTML = `<option value="">Sem corrida (despesa geral)</option>` +
    (typeof CALENDARIO !== 'undefined' ? CALENDARIO.escola_provas.filter(p=>p.escola_participa).map(p=>`<option value="${p.id}">${p.nome}</option>`).join('') : '');
  openModal('modal-desp');
}

function confirmarDespesa() {
  const desc = document.getElementById('desp-desc').value.trim();
  const data = document.getElementById('desp-data').value;
  const valor = parseFloat(document.getElementById('desp-valor').value);
  const tipo = document.getElementById('desp-tipo').value;
  const provaId = document.getElementById('desp-prova').value;
  const obs = document.getElementById('desp-obs').value;
  const comp = document.getElementById('desp-comp').checked;
  if(!desc || !valor) { toast('Preenche descrição e valor'); return; }
  FINANCEIRA_DB.despesas.unshift({id:'d'+Date.now(), data, tipo, descricao:desc, valor, provaId, provaNome:'', comprovativo:comp, obs});
  closeModal('modal-desp');
  toast('Despesa registada!','ok');
  renderDespesas();
}

function openModalReceita() {
  document.getElementById('rec-tipo').innerHTML = FINANCEIRA_DB.TIPOS_RECEITA.map(t=>`<option value="${t.id}">${t.icone} ${t.nome}</option>`).join('');
  openModal('modal-rec');
}

function confirmarReceita() {
  const desc = document.getElementById('rec-desc').value.trim();
  const data = document.getElementById('rec-data').value;
  const valor = parseFloat(document.getElementById('rec-valor').value);
  const tipo = document.getElementById('rec-tipo').value;
  const obs = document.getElementById('rec-obs').value;
  const recebido = document.getElementById('rec-recebido').checked;
  if(!desc || !valor) { toast('Preenche descrição e valor'); return; }
  FINANCEIRA_DB.receitas.unshift({id:'r'+Date.now(), data, tipo, descricao:desc, valor, recebido, dataRecebimento:recebido?data:'', obs});
  closeModal('modal-rec');
  toast('Receita registada!','ok');
  renderReceitas();
}

// ============================================================
// MODAIS
// ============================================================
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// ============================================================
// TOAST
// ============================================================
function toast(msg,type=''){
  const el=document.getElementById('toast-el');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ============================================================
// INIT
// ============================================================
openTab('dashboard');
</script>
</body>
