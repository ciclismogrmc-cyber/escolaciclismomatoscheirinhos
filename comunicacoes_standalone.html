<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunicações — Escola de Ciclismo</title>
<style>
:root{
  --red:#CC0000;--red-bg:#FFF0F0;--red-bd:rgba(204,0,0,.25);
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-bd:rgba(24,95,165,.25);
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-bd:rgba(15,110,86,.25);
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-bd:rgba(133,79,11,.25);
  --green:#3B6D11;--green-bg:#EAF3DE;--green-bd:rgba(59,109,17,.25);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-bd:rgba(83,74,183,.25);
  --gray:#5F5E5A;--gray-bg:#F1EFE8;--gray-bd:rgba(95,94,90,.25);
  --bg:#F5F4F1;--surface:#fff;--border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1A1A1A;--muted:#666660;--hint:#9A9A94;
  --r:10px;--rs:6px;--sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--surface);border-right:.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sb-logo{padding:1.1rem 1rem .9rem;border-bottom:.5px solid var(--border)}
.sb-logo-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sb-icon{width:32px;height:32px;background:var(--red);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.sb-name{font-size:13px;font-weight:600;line-height:1.2}
.sb-season{font-size:11px;color:var(--hint);padding-left:40px}
.sb-nav{padding:.6rem .5rem;flex:1;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:600;color:var(--hint);letter-spacing:.08em;text-transform:uppercase;padding:.5rem .5rem .2rem;margin-top:.4rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.45rem .75rem;border-radius:var(--rs);cursor:pointer;color:var(--muted);font-size:13px;transition:background .1s,color .1s;text-decoration:none}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.nav-badge{margin-left:auto;background:var(--red-bg);color:var(--red);font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px}
.sb-foot{padding:.7rem 1rem;border-top:.5px solid var(--border);display:flex;align-items:center;gap:8px}
.ua{width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-title{font-size:16px;font-weight:600}
.tb-sub{font-size:12px;color:var(--muted);margin-top:1px}
.tb-actions{display:flex;gap:8px}
.content{padding:1.1rem 1.5rem;flex:1}

/* LAYOUT */
.layout{display:grid;grid-template-columns:280px 1fr;gap:1rem;align-items:start}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

/* BADGES */
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-warn{background:var(--amber-bg);color:var(--amber)}
.b-danger{background:var(--red-bg);color:var(--red)}
.b-info{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:var(--gray-bg);color:var(--gray)}
.b-purple{background:var(--purple-bg);color:var(--purple)}

/* BUTTONS */
button,.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rs);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:background .11s;font-family:inherit;white-space:nowrap}
button:hover,.btn:hover{background:var(--bg)}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff}
.btn-primary:hover{background:#AA0000}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-wa{background:#25D366;border-color:#25D366;color:#fff;font-weight:600}
.btn-wa:hover{background:#1aad53}
.btn-wa-lg{font-size:15px;padding:10px 20px}

select,input,textarea{padding:7px 9px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--surface);color:var(--text);outline:none;font-family:inherit}
select:focus,input:focus,textarea:focus{border-color:var(--blue)}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--rs);padding:3px;border:.5px solid var(--border);margin-bottom:1.1rem;width:fit-content}
.tab{padding:6px 14px;border-radius:4px;font-size:13px;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .12s;font-family:inherit}
.tab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* TIPOS DE MENSAGEM */
.tipo-grid{display:grid;grid-template-columns:1fr;gap:6px;margin-bottom:1rem}
.tipo-btn{display:flex;align-items:center;gap:10px;padding:.65rem .85rem;border-radius:var(--rs);border:.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .12s;text-align:left}
.tipo-btn:hover{border-color:var(--border2);background:var(--bg)}
.tipo-btn.active{border-color:var(--blue-bd);background:var(--blue-bg)}
.tipo-ico{font-size:20px;width:32px;text-align:center}
.tipo-nome{font-size:13px;font-weight:500}
.tipo-desc{font-size:11px;color:var(--muted)}

/* GRUPOS */
.grupos-wrap{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.85rem;margin-bottom:1rem}
.grupos-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.6rem}
.grupo-pills{display:flex;gap:5px;flex-wrap:wrap}
.grupo-pill{font-size:12px;padding:4px 10px;border-radius:20px;border:.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:4px}
.grupo-pill:hover{border-color:var(--border2)}
.grupo-pill.active{color:#fff;font-weight:500;border-color:transparent}
.grupo-pill.sel-todos{background:var(--purple)}
.grupo-pill.sel-escolas{background:var(--teal)}
.grupo-pill.sel-sub{background:var(--blue)}
.grupo-pill.sel-staff{background:var(--gray)}

/* EDITOR */
.editor-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.editor-hd{padding:.85rem 1rem;border-bottom:.5px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:8px}
.editor-body{padding:1rem}
.editor-titulo{width:100%;padding:8px 10px;border:.5px solid var(--border);border-radius:var(--rs);font-size:14px;font-weight:500;margin-bottom:.75rem}
.editor-titulo:focus{border-color:var(--blue);outline:none}
.editor-textarea{width:100%;padding:10px 12px;border:.5px solid var(--border);border-radius:var(--rs);font-size:13px;min-height:220px;resize:vertical;line-height:1.6;font-family:inherit}
.editor-textarea:focus{border-color:var(--blue);outline:none}
.editor-foot{padding:.85rem 1rem;border-top:.5px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* PREVIEW WA */
.wa-preview{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden;position:sticky;top:80px}
.wa-preview-hd{padding:.75rem 1rem;background:#075E54;color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.wa-bubble{background:#DCF8C6;border-radius:8px 8px 0 8px;padding:.75rem .9rem;margin:.85rem;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,.1);position:relative}
.wa-bubble-info{font-size:11px;color:#8a8a8a;text-align:right;margin-top:4px}
.wa-preview-foot{padding:.75rem 1rem;border-top:.5px solid var(--border);text-align:center}

/* HISTÓRICO */
.hist-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .1s}
.hist-card:hover{border-color:var(--border2)}
.hist-hd{padding:.75rem 1rem;display:flex;align-items:center;gap:10px}
.hist-ico{font-size:18px;width:32px;text-align:center}
.hist-title{font-size:13px;font-weight:500;flex:1}
.hist-meta{font-size:11px;color:var(--muted);margin-top:1px}
.hist-body{padding:.75rem 1rem 1rem;border-top:.5px solid var(--border);display:none;background:var(--bg)}
.hist-body.open{display:block}
.hist-msg{font-size:12px;white-space:pre-wrap;line-height:1.6;background:#DCF8C6;border-radius:8px;padding:.7rem .9rem}
.hist-grupos{display:flex;gap:4px;flex-wrap:wrap;margin-top:.5rem}

/* RASCUNHOS */
.rasc-card{background:var(--surface);border:.5px solid var(--amber-bd);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:8px;display:flex;align-items:center;gap:10px}

/* ANIVERSÁRIOS */
.bday-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;padding:.75rem 1rem;display:flex;align-items:center;gap:10px}
.bday-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.bday-today{background:var(--red-bg);color:var(--red)}
.bday-week{background:var(--blue-bg);color:var(--blue)}

/* INFO BOX */
.info-box{padding:.65rem .85rem;border-radius:var(--rs);font-size:12px;margin-bottom:.8rem}
.ib-blue{background:var(--blue-bg);color:var(--blue)}
.ib-green{background:var(--green-bg);color:var(--green)}
.ib-warn{background:var(--amber-bg);color:var(--amber)}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:.55rem .95rem;border-radius:var(--rs);font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--green)}
.toast.warn{background:var(--amber)}
</style>
</head>

<script>
// ============================================================
// STATE
// ============================================================
let TAB = 'nova';
let TIPO_SEL = 'aviso';
let GRUPOS_SEL = new Set();
let HIST_OPEN = null;
let EDITOR_TEXTO = '';
let EDITOR_TITULO = '';

// ============================================================
// UTILS
// ============================================================
function fmtDate(d) { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDateLong(d) { if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'}); }
function initials(n) { return n.split(' ').filter((_,i,a)=>i===0||i===a.length-1).map(x=>x[0]).join('').toUpperCase(); }
function calcAge(nasc) {
  const d=new Date(nasc), t=new Date();
  let a=t.getFullYear()-d.getFullYear();
  if(t<new Date(t.getFullYear(),d.getMonth(),d.getDate())) a--;
  return a;
}
function escalaoLabel(ep) {
  if(!ep) return '—';
  if(ep.escalao==='escolas') return 'Escolas'+(ep.subescalao?' / '+ep.subescalao.toUpperCase():'');
  return ep.escalao.toUpperCase();
}

function tipoBadge(tipo) {
  const t = COMUNICACOES_DB.getTemplate(tipo);
  const colors = {aviso:'b-info',convocatoria:'b-teal',resultado:'b-ok',treino:'b-blue',pagamento:'b-danger',parabens:'b-danger',informacao:'b-gray'};
  return `<span class="badge ${colors[tipo]||'b-gray'}">${t?.icone||''} ${t?.nome||tipo}</span>`;
}

function grupoPillClass(gid) {
  const g = COMUNICACOES_DB.getGrupo(gid);
  if(!g) return '';
  if(g.escalao==='todos') return 'sel-todos';
  if(g.escalao==='staff') return 'sel-staff';
  if(g.escalao==='escolas'||g.escalao.startsWith('sub1')) return 'sel-escolas';
  return 'sel-sub';
}

// ============================================================
// TABS
// ============================================================
function setTab(tab) {
  TAB = tab;
  ['nova','aniversarios','historico','rascunhos'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('content-'+t).style.display = t===tab ? 'block' : 'none';
  });
  if(tab==='nova') renderNova();
  else if(tab==='aniversarios') renderAniversarios();
  else if(tab==='historico') renderHistorico();
  else if(tab==='rascunhos') renderRascunhos();
}

// ============================================================
// NOVA MENSAGEM
// ============================================================
function renderNova() {
  const tipos = Object.entries(COMUNICACOES_DB.templates);
  const grupos = COMUNICACOES_DB.grupos;
  const templ = COMUNICACOES_DB.getTemplate(TIPO_SEL);

  // Texto inicial baseado no template
  if(!EDITOR_TEXTO && templ) {
    EDITOR_TEXTO = templ.template({
      texto: 'Escreve aqui a tua mensagem...',
      corrida:'Nome da corrida', data:'DD/MM/AAAA', local:'Local',
      hora:'HH:MM', atletas:'• Nome atleta 1\n• Nome atleta 2', prazo:'DD/MM',
      escalao:'Escalão', resultados:'🥇 1º Nome\n🥈 2º Nome',
      atleta:'Nome do atleta', valor:'—€',
      titulo:'Título', nome:'Nome',
    });
  }

  document.getElementById('content-nova').innerHTML = `
  <div class="layout">
    <!-- COLUNA ESQUERDA: tipo + grupos -->
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem">Tipo de mensagem</div>
      <div class="tipo-grid">
        ${tipos.map(([id,t])=>`
          <div class="tipo-btn${id===TIPO_SEL?' active':''}" onclick="selectTipo('${id}')">
            <div class="tipo-ico">${t.icone}</div>
            <div>
              <div class="tipo-nome">${t.nome}</div>
            </div>
          </div>`).join('')}
      </div>

      <div class="grupos-wrap">
        <div class="grupos-title">Enviar para</div>
        <div class="grupo-pills">
          ${grupos.map(g=>`
            <div class="grupo-pill${GRUPOS_SEL.has(g.id)?' active '+grupoPillClass(g.id):''}" onclick="toggleGrupo('${g.id}')">
              ${g.icone} ${g.nome}
            </div>`).join('')}
        </div>
        ${GRUPOS_SEL.size===0?'<div style="font-size:11px;color:var(--red);margin-top:.4rem">Seleciona pelo menos um grupo</div>':''}
      </div>

      <div class="info-box ib-blue">
        💡 A mensagem será gerada com formatação WhatsApp (<strong>*negrito*</strong>, _itálico_). Um clique abre o WhatsApp com a mensagem pronta.
      </div>
    </div>

    <!-- COLUNA DIREITA: editor + preview -->
    <div>
      <div class="editor-card">
        <div class="editor-hd">
          <span style="font-size:18px">${templ?.icone||'✉️'}</span>
          <span style="font-size:13px;font-weight:600">${templ?.nome||'Mensagem'}</span>
          <div style="flex:1"></div>
          <button class="btn-sm btn-ghost" onclick="recarregarTemplate()">↺ Recarregar template</button>
        </div>
        <div class="editor-body">
          <input type="text" class="editor-titulo" id="editor-titulo" placeholder="Título (para referência interna)..." value="${EDITOR_TITULO||''}" oninput="EDITOR_TITULO=this.value">
          <textarea class="editor-textarea" id="editor-texto" oninput="updatePreview()">${EDITOR_TEXTO}</textarea>
        </div>
        <div class="editor-foot">
          <button class="btn-ghost btn-sm" onclick="guardarRascunho()">💾 Guardar rascunho</button>
          <div style="flex:1"></div>
          <button class="btn-sm" onclick="copiarMensagem()">📋 Copiar</button>
          <button class="btn-wa btn-wa-lg" onclick="enviarWA()" ${GRUPOS_SEL.size===0?'disabled style="opacity:.5"':''}>
            📱 Enviar via WhatsApp
          </button>
        </div>
      </div>

      <!-- PREVIEW WhatsApp -->
      <div class="wa-preview" style="margin-top:1rem">
        <div class="wa-preview-hd">
          <span>📱</span>
          <span>Pré-visualização WhatsApp</span>
          <span style="margin-left:auto;font-size:11px;opacity:.7">${GRUPOS_SEL.size?[...GRUPOS_SEL].map(g=>COMUNICACOES_DB.getGrupo(g)?.nome).join(', '):'Nenhum grupo selecionado'}</span>
        </div>
        <div class="wa-bubble" id="wa-preview-text">${formatWAPreview(EDITOR_TEXTO)}</div>
        <div class="wa-preview-foot">
          <div style="font-size:11px;color:var(--muted)">A mensagem abrirá no WhatsApp pronta a enviar para os grupos selecionados</div>
        </div>
      </div>
    </div>
  </div>`;

  // Sync textarea
  setTimeout(()=>{
    const ta = document.getElementById('editor-texto');
    if(ta) ta.value = EDITOR_TEXTO;
  },0);
}

function formatWAPreview(txt) {
  if(!txt) return '';
  return txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*([^*]+)\*/g,'<strong>$1</strong>')
    .replace(/_([^_]+)_/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

function updatePreview() {
  EDITOR_TEXTO = document.getElementById('editor-texto').value;
  const prev = document.getElementById('wa-preview-text');
  if(prev) prev.innerHTML = formatWAPreview(EDITOR_TEXTO);
}

function selectTipo(tipo) {
  TIPO_SEL = tipo;
  EDITOR_TEXTO = '';
  renderNova();
}

function recarregarTemplate() {
  EDITOR_TEXTO = '';
  renderNova();
  toast('Template recarregado');
}

function toggleGrupo(gid) {
  if(GRUPOS_SEL.has(gid)) GRUPOS_SEL.delete(gid);
  else {
    // Se selecionar "Todos", limpar os outros
    if(gid==='g_todos') GRUPOS_SEL.clear();
    else GRUPOS_SEL.delete('g_todos');
    GRUPOS_SEL.add(gid);
  }
  renderNova();
}

function enviarWA() {
  if(GRUPOS_SEL.size===0) { toast('Seleciona pelo menos um grupo','warn'); return; }
  const texto = document.getElementById('editor-texto')?.value || EDITOR_TEXTO;
  if(!texto.trim()) { toast('Escreve uma mensagem primeiro','warn'); return; }

  // Guardar no histórico
  const titulo = document.getElementById('editor-titulo')?.value || 'Sem título';
  COMUNICACOES_DB.historico.unshift({
    id:'h'+Date.now(), tipo:TIPO_SEL,
    titulo: titulo || COMUNICACOES_DB.getTemplate(TIPO_SEL)?.nome || 'Mensagem',
    grupos:[...GRUPOS_SEL],
    data:new Date().toISOString().split('T')[0],
    hora:new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}),
    autor:'JP Serra', estado:'enviado', texto
  });

  // Abrir WhatsApp
  const msg = encodeURIComponent(texto);
  window.open('https://wa.me/?text='+msg,'_blank');

  toast('Mensagem enviada e guardada no histórico!','ok');

  // Limpar editor
  EDITOR_TEXTO=''; EDITOR_TITULO=''; GRUPOS_SEL.clear();
  setTimeout(()=>renderNova(), 500);
}

function copiarMensagem() {
  const texto = document.getElementById('editor-texto')?.value || EDITOR_TEXTO;
  if(navigator.clipboard) navigator.clipboard.writeText(texto).then(()=>toast('Mensagem copiada!','ok'));
  else toast('Copia o texto manualmente');
}

function guardarRascunho() {
  const texto = document.getElementById('editor-texto')?.value || EDITOR_TEXTO;
  const titulo = document.getElementById('editor-titulo')?.value || 'Rascunho sem título';
  COMUNICACOES_DB.rascunhos.unshift({
    id:'r'+Date.now(), tipo:TIPO_SEL, titulo,
    grupos:[...GRUPOS_SEL], data:new Date().toISOString().split('T')[0], texto
  });
  // Atualizar badge
  document.querySelector('#tab-rascunhos .badge').textContent = COMUNICACOES_DB.rascunhos.length;
  toast('Rascunho guardado!','ok');
}

function renderAniversarios() {

    const d=new Date(a.nasc);

    return diff>0&&diff<=7;
  });

  const STAFF_DB = [
    {nome:'João Paulo Serra', cargo:'Treinador', nasc:'1975-06-20'},
    {nome:'Manuel Costa', cargo:'Diretor', nasc:'1970-09-14'},
    {nome:'Carlos Reis', cargo:'Mecânico', nasc:'1980-11-03'},
  ];

  const staffHoje = STAFF_DB.filter(s=>{const d=new Date(s.nasc);return d.getMonth()===hoje.getMonth()&&d.getDate()===hoje.getDate();});
  const staffProximo = STAFF_DB.filter(s=>{const d=new Date(s.nasc);const e=new Date(hoje.getFullYear(),d.getMonth(),d.getDate());const diff=(e-hoje)/86400000;return diff>0&&diff<=30;});

  const totalHoje = anivHoje.length + staffHoje.length;

  document.getElementById('content-aniversarios').innerHTML = `

  ${totalHoje > 0 ? `
  <div style="background:var(--red-bg);border:.5px solid var(--red-bd);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:1rem">
    <div style="font-size:13px;font-weight:600;color:var(--red);margin-bottom:.6rem">🎂 Hoje — ${totalHoje} aniversário(s) — Envio automático pendente</div>
    ${[...anivHoje.map(a=>({tipo:'atleta',obj:a})),...staffHoje.map(s=>({tipo:'staff',obj:s}))].map(({tipo,obj})=>{
      const ep = tipo==='atleta' ? obj.epocas[DB.epoca_atual] : null;
      const escalao = ep?.escalao || 'sub17';
      const idade = calcAge(obj.nasc) + (tipo==='atleta'?0:0);
      const jaEnviado = BDAY_ENVIADOS.has(obj.nome);
      const preview = getMsgBday(obj.nome, idade, tipo==='staff'?'staff':escalao);
      return `<div style="background:var(--surface);border-radius:var(--rs);padding:.75rem;margin-bottom:6px;border:.5px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem">
          <div class="bday-av bday-today">${initials(obj.nome)}</div>
          <div style="flex:1">
            <div style="font-weight:600">${obj.nome}</div>
            <div style="font-size:11px;color:var(--muted)">${tipo==='staff'?obj.cargo:escalaoLabel(ep)} · ${idade} anos · ${tipo==='staff'?'Staff':'Atleta'}</div>
          </div>
          ${jaEnviado
            ? '<span class="badge b-ok">✓ Enviado hoje</span>'
            : `<button class="btn-wa" onclick="enviarBdayAuto('${obj.nome}',${idade},'${tipo==='staff'?'staff':escalao}','${obj.nome}')">${jaEnviado?'✓ Enviado':'🎂 Enviar parabéns'}</button>`}
        </div>
        <div style="font-size:11px;background:#DCF8C6;border-radius:var(--rs);padding:.5rem .7rem;white-space:pre-wrap;line-height:1.5;color:#1a1a1a;max-height:80px;overflow:hidden">${preview.slice(0,200)}${preview.length>200?'…':''}</div>
      </div>`;
    }).join('')}
  </div>` : `<div class="info-box ib-green">✓ Nenhum aniversário hoje</div>`}

  <!-- CONFIG mensagens tipo -->
  <div style="background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:1rem">
    <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.6rem;display:flex;align-items:center;justify-content:space-between">
      <span>⚙️ Mensagens tipo por escalão</span>
      <button class="btn-sm" onclick="toggleConfigBday()">Editar</button>
    </div>
    <div id="config-bday" style="display:none">
      ${Object.entries(MSG_BDAY).map(([esc,fn])=>{
        const nome='Atleta'; const idade=15;
        return `<div style="margin-bottom:.75rem">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:3px">${esc}</div>
          <textarea class="editor-textarea" style="min-height:80px;font-size:11px" id="tmpl-${esc}">${fn(nome,idade)}</textarea>
        </div>`;
      }).join('')}
      <button class="btn-sm btn-green" onclick="guardarTemplates()">✓ Guardar alterações</button>
    </div>
    <div id="config-bday-preview">
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${Object.keys(MSG_BDAY).map(esc=>`<span class="badge b-info" style="cursor:pointer" onclick="previewTemplate('${esc}')">${esc}</span>`).join('')}
      </div>
      <div id="tmpl-preview" style="font-size:12px;background:var(--bg);border-radius:var(--rs);padding:.6rem;margin-top:.5rem;white-space:pre-wrap;line-height:1.5;display:none"></div>
    </div>
  </div>

  <!-- Esta semana -->
  ${anivSemana.length + staffProximo.filter(s=>{const d=new Date(s.nasc);const e=new Date(hoje.getFullYear(),d.getMonth(),d.getDate());return (e-hoje)/86400000<=7;}).length > 0 ? `
  <div style="font-size:12px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.6rem">📅 Esta semana</div>
  ${[...anivSemana,...staffProximo.filter(s=>{const d=new Date(s.nasc);const e=new Date(hoje.getFullYear(),d.getMonth(),d.getDate());const diff=(e-hoje)/86400000;return diff>0&&diff<=7;}).map(s=>({...s,_staff:true}))].map(a=>{
    const d=new Date(a.nasc);
    const esteAno=new Date(hoje.getFullYear(),d.getMonth(),d.getDate());
    const dias=Math.ceil((esteAno-hoje)/86400000);
    const ep=a._staff?null:a.epocas?.[DB.epoca_atual];
    const escalao=a._staff?'staff':ep?.escalao||'sub17';
    const idade=calcAge(a.nasc)+1;
    return renderBdayCard(a,dias,false,escalao,a._staff);
  }).join('')}` : ''}

  <!-- Este mês -->
  ${anivMes.length > 0 ? `
  <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:.85rem 0 .6rem">📆 Este mês</div>
  ${anivMes.map(a=>{
    const d=new Date(a.nasc);
    const esteAno=new Date(hoje.getFullYear(),d.getMonth(),d.getDate());
    const ep=a.epocas?.[DB.epoca_atual];
    return renderBdayCard(a,Math.ceil((esteAno-hoje)/86400000),false,ep?.escalao||'sub17',false);
  }).join('')}` : ''}

  ${!totalHoje&&!anivSemana.length&&!anivMes.length ?
    '<div class="info-box ib-blue">Sem aniversários nos próximos 30 dias.</div>' : ''}`;
}

function renderBdayCard(a, dias, isHoje, escalao, isStaff) {
  const ep = isStaff ? null : a.epocas?.[DB.epoca_atual];
  const idade = calcAge(a.nasc) + (isHoje?0:1);
  const jaEnviado = BDAY_ENVIADOS.has(a.nome);
  return `<div class="bday-card">
    <div class="bday-av ${isHoje?'bday-today':'bday-week'}">${initials(a.nome)}</div>
    <div style="flex:1">
      <div style="font-weight:500">${a.nome}</div>
      <div style="font-size:12px;color:var(--muted)">${isStaff?a.cargo:escalaoLabel(ep)} · ${isHoje?'Hoje':'Em '+dias+' dia'+(dias>1?'s':'')} · ${idade} anos</div>
    </div>
    ${jaEnviado
      ? '<span class="badge b-ok">✓ Enviado</span>'
      : `<button class="btn-wa btn-sm" onclick="enviarBdayAuto('${a.nome}',${idade},'${escalao}','${a.nome}')">🎂 Parabéns</button>`}
  </div>`;
}

function enviarBdayAuto(nome, idade, escalao, key) {
  const msg = getMsgBday(nome, idade, escalao);
  const encoded = encodeURIComponent(msg);
  window.open('https://wa.me/?text='+encoded,'_blank');
  BDAY_ENVIADOS.add(key);
  toast('Parabéns enviados para '+nome.split(' ')[0]+'!','ok');

  COMUNICACOES_DB.historico.unshift({
    id:'h'+Date.now(), tipo:'parabens',
    titulo:'🎂 Parabéns — '+nome,
    grupos:[escalao==='staff'?'g_staff':'g_todos'],
    data:new Date().toISOString().split('T')[0],
    hora:new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}),
    autor:'Automático', estado:'enviado', texto:msg
  });

  renderAniversarios();
}

function toggleConfigBday() {
  const el=document.getElementById('config-bday');
  const el2=document.getElementById('config-bday-preview');
  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
  if(el2) el2.style.display=isOpen?'block':'none';
}

function previewTemplate(esc) {
  const fn=MSG_BDAY[esc];
  const prev=document.getElementById('tmpl-preview');
  if(!prev||!fn) return;
  prev.style.display='block';
  prev.textContent=fn('Nome Atleta',16);
}

function guardarTemplates() {
  Object.keys(MSG_BDAY).forEach(esc=>{
    const el=document.getElementById('tmpl-'+esc);
    if(!el) return;
    const txt=el.value;
    MSG_BDAY[esc]=(nome,idade)=>txt.replace(/Nome Atleta/g,nome).replace(/16/g,idade);
  });
  toggleConfigBday();
  toast('Mensagens tipo guardadas!','ok');
}

function enviarParabensAtleta(nome, idade, escalao) { enviarBdayAuto(nome, idade, escalao, nome); }
function enviarParabensStaff(nome, idade) { enviarBdayAuto(nome, idade, 'staff', nome); }

// ============================================================
// HISTÓRICO
// ============================================================
function renderHistorico() {
  const hist = COMUNICACOES_DB.historico;
  const filtros = ['todos','aviso','convocatoria','resultado','pagamento','parabens'];

  document.getElementById('content-historico').innerHTML = `
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem">
    ${filtros.map(f=>`<div class="grupo-pill${f==='todos'?' active sel-todos':''}" onclick="filtrarHist('${f}',this)" data-filt="${f}">${f==='todos'?'Todos':COMUNICACOES_DB.getTemplate(f)?.icone+' '+COMUNICACOES_DB.getTemplate(f)?.nome||f}</div>`).join('')}
  </div>
  <div id="hist-lista">
    ${renderHistLista(hist)}
  </div>`;
}

function renderHistLista(lista) {
  if(!lista.length) return '<div class="info-box ib-blue">Sem comunicações no histórico.</div>';
  return lista.map(h=>{
    const t=COMUNICACOES_DB.getTemplate(h.tipo);
    return `<div class="hist-card" onclick="toggleHist('${h.id}')">
      <div class="hist-hd">
        <div class="hist-ico">${t?.icone||'✉️'}</div>
        <div style="flex:1">
          <div class="hist-title">${h.titulo}</div>
          <div class="hist-meta">${h.data} às ${h.hora} · por ${h.autor}</div>
        </div>
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          ${h.grupos.map(gid=>{const g=COMUNICACOES_DB.getGrupo(gid);return g?`<span class="badge b-info">${g.icone} ${g.nome}</span>`:''}).join('')}
          <span class="badge b-ok">Enviado</span>
        </div>
      </div>
      <div class="hist-body" id="hb-${h.id}">
        <div class="hist-msg">${h.texto}</div>
        <div style="display:flex;gap:6px;margin-top:.6rem">
          <button class="btn-sm btn-wa" onclick="event.stopPropagation();reenviarHist('${h.id}')">📱 Reenviar</button>
          <button class="btn-sm btn-ghost" onclick="event.stopPropagation();editarHist('${h.id}')">✏️ Editar e reenviar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleHist(id) {
  const el = document.getElementById('hb-'+id);
  if(!el) return;
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.hist-body').forEach(b=>b.classList.remove('open'));
  if(!isOpen) el.classList.add('open');
}

function filtrarHist(tipo, el) {
  document.querySelectorAll('[data-filt]').forEach(p=>p.classList.remove('active','sel-todos','sel-sub'));
  el.classList.add('active','sel-todos');
  const lista = tipo==='todos' ? COMUNICACOES_DB.historico : COMUNICACOES_DB.historico.filter(h=>h.tipo===tipo);
  document.getElementById('hist-lista').innerHTML = renderHistLista(lista);
}

function reenviarHist(id) {
  const h = COMUNICACOES_DB.historico.find(x=>x.id===id);
  if(!h) return;
  const msg = encodeURIComponent(h.texto);
  window.open('https://wa.me/?text='+msg,'_blank');
  toast('Mensagem pronta para reenviar!','ok');
}

function editarHist(id) {
  const h = COMUNICACOES_DB.historico.find(x=>x.id===id);
  if(!h) return;
  TIPO_SEL=h.tipo; EDITOR_TEXTO=h.texto; EDITOR_TITULO=h.titulo;
  GRUPOS_SEL=new Set(h.grupos);
  setTab('nova');
  toast('Mensagem carregada para edição');
}

// ============================================================
// RASCUNHOS
// ============================================================
function renderRascunhos() {
  const rasc = COMUNICACOES_DB.rascunhos;
  document.getElementById('content-rascunhos').innerHTML = `
  ${!rasc.length ? '<div class="info-box ib-blue">Sem rascunhos guardados.</div>' : ''}
  ${rasc.map(r=>{
    const t=COMUNICACOES_DB.getTemplate(r.tipo);
    return `<div class="rasc-card">
      <div style="font-size:18px">${t?.icone||'📝'}</div>
      <div style="flex:1">
        <div style="font-weight:500">${r.titulo}</div>
        <div style="font-size:12px;color:var(--muted)">${r.data} · ${t?.nome||r.tipo}</div>
      </div>
      <button class="btn-sm btn-primary" onclick="carregarRascunho('${r.id}')">✏️ Editar</button>
      <button class="btn-sm btn-ghost" onclick="removerRascunho('${r.id}')">✕</button>
    </div>`;
  }).join('')}`;
}

function carregarRascunho(id) {
  const r = COMUNICACOES_DB.rascunhos.find(x=>x.id===id);
  if(!r) return;
  TIPO_SEL=r.tipo; EDITOR_TEXTO=r.texto; EDITOR_TITULO=r.titulo;
  GRUPOS_SEL=new Set(r.grupos||[]);
  setTab('nova');
  toast('Rascunho carregado!','ok');
}

function removerRascunho(id) {
  COMUNICACOES_DB.rascunhos = COMUNICACOES_DB.rascunhos.filter(r=>r.id!==id);
  document.querySelector('#tab-rascunhos .badge').textContent = COMUNICACOES_DB.rascunhos.length||'';
  renderRascunhos();
  toast('Rascunho removido');
}

// ============================================================
// TOAST
// ============================================================
function toast(msg,type=''){
  const el=document.getElementById('toast-el');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ============================================================
// INIT
// ============================================================
renderNova();
</script>
</body>
</html>
